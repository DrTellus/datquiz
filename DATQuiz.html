<title>DATQuiz — DAT102 & DAT107</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f13;color:#e8e8f0;min-height:100vh;padding:1rem}
.app{max-width:720px;margin:0 auto;padding:1rem 0}
.card{background:#1a1a24;border:1px solid #2a2a3a;border-radius:14px;padding:1.25rem;margin-bottom:10px}
.logo{font-size:20px;font-weight:600}.logo span{color:#7f77dd}
.sect-label{font-size:11px;font-weight:500;color:#555;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.topic-chip{background:#111118;border:1px solid #2a2a3a;border-radius:10px;padding:9px 10px;cursor:pointer;text-align:left;transition:all .12s;width:100%}
.topic-chip:hover{border-color:#534ab7}
.topic-chip.sel{background:#1e1a3a;border-color:#7f77dd}
.pill-row{display:flex;gap:8px;flex-wrap:wrap}
.pill{background:#111118;border:1px solid #2a2a3a;border-radius:20px;padding:7px 16px;cursor:pointer;font-size:13px;color:#aaa;transition:all .12s}
.pill:hover{border-color:#534ab7;color:#e8e8f0}
.pill.sel{background:#1e1a3a;border-color:#7f77dd;color:#a89ef5;font-weight:500}
.btn-p{background:#534ab7;color:#fff;border:none;border-radius:10px;padding:10px 22px;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .12s}
.btn-p:hover{opacity:.88}
.btn-p:disabled{opacity:.35;cursor:not-allowed}
.btn-s{background:#111118;border:1px solid #2a2a3a;border-radius:10px;padding:9px 18px;font-size:13px;color:#ccc;cursor:pointer;transition:all .12s}
.btn-s:hover{border-color:#534ab7;color:#e8e8f0}
.btn-g{background:transparent;border:none;font-size:13px;color:#666;cursor:pointer;padding:6px 10px;border-radius:8px;transition:all .12s}
.btn-g:hover{color:#e8e8f0;background:#1a1a24}
.prog-track{background:#1a1a24;border-radius:4px;height:3px;margin-bottom:1.25rem;overflow:hidden}
.prog-fill{background:linear-gradient(90deg,#534ab7,#7f77dd);height:100%;border-radius:4px;transition:width .3s}
.badge{font-size:11px;padding:3px 9px;border-radius:8px;font-weight:500}
.q-text{font-size:15px;color:#e8e8f0;line-height:1.65;margin-bottom:1rem;font-weight:500}
.code-block{font-family:'SF Mono',Monaco,monospace;font-size:12.5px;background:#0a0a10;border:1px solid #2a2a3a;border-radius:10px;padding:14px;margin-bottom:1rem;white-space:pre;overflow-x:auto;line-height:1.7;color:#c8d3f5}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{background:#111118;border:1px solid #2a2a3a;border-radius:10px;padding:11px 14px;cursor:pointer;font-size:14px;color:#ccc;text-align:left;display:flex;align-items:flex-start;gap:10px;width:100%;transition:all .12s}
.opt:hover:not(:disabled){border-color:#534ab7;background:#1a1a24;color:#e8e8f0}
.opt:disabled{cursor:default}
.opt.correct{border-color:#1d9e75;background:#0a1f16;color:#5dcaa5}
.opt.wrong{border-color:#e24b4a;background:#1f0a0a;color:#f09595}
.opt-l{width:22px;height:22px;border-radius:50%;border:1px solid #333;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;color:#555}
.opt.correct .opt-l{background:#1d9e75;border-color:#1d9e75;color:#fff}
.opt.wrong .opt-l{background:#e24b4a;border-color:#e24b4a;color:#fff}
.res-ok{background:#0a1f16;border:1px solid #1d9e75;color:#5dcaa5;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px}
.res-fail{background:#1f0a0a;border:1px solid #e24b4a;color:#f09595;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px}
.res-time{background:#1f180a;border:1px solid #ba7517;color:#fac775;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px}
.exp-box{background:#111118;border-left:2px solid #534ab7;padding:12px 14px;border-radius:0 10px 10px 0;margin-top:12px;font-size:13px;color:#aaa;line-height:1.7}
.exp-box b{color:#e8e8f0;font-weight:500}
.pen-ref{font-size:11px;color:#444;margin-top:8px}
.hint-sec{margin-top:10px}
.hint-ctrl{display:flex;align-items:center;gap:10px}
.hdots{display:flex;gap:4px}
.hdot{width:7px;height:7px;border-radius:50%;background:#2a2a3a;transition:background .12s}
.hdot.used{background:#ba7517}
.hint-box{background:#1a150a;border-left:2px solid #ba7517;padding:10px 13px;border-radius:0 8px 8px 0;margin-top:10px;font-size:13px;color:#c8a96e;line-height:1.6}
.hint-box b{color:#fac775}
.score-circ{width:90px;height:90px;border-radius:50%;border:3px solid #534ab7;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 1rem;background:#1a1a24}
.snum{font-size:24px;font-weight:600;color:#a89ef5}
.ssub{font-size:11px;color:#555}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.stat-card{background:#111118;border:1px solid #2a2a3a;border-radius:10px;padding:14px;text-align:center}
.stnum{font-size:24px;font-weight:600;color:#e8e8f0}
.stlbl{font-size:12px;color:#555;margin-top:3px}
.streak-pill{display:inline-flex;background:#1a150a;border:1px solid #ba7517;color:#fac775;border-radius:10px;padding:4px 10px;font-size:12px;font-weight:500}
.timer{font-size:13px;font-weight:600;padding:5px 12px;border-radius:10px;background:#111118;border:1px solid #2a2a3a;color:#e8e8f0;min-width:48px;text-align:center}
.timer.urgent{background:#1f0a0a;border-color:#e24b4a;color:#f09595}
.rev-item{border-top:1px solid #1a1a24;padding:10px 0;font-size:13px}
.b-ok{background:#0a1f16;color:#5dcaa5;border-radius:8px;padding:2px 8px;font-size:11px;font-weight:500;display:inline-block}
.b-fail{background:#1f0a0a;color:#f09595;border-radius:8px;padding:2px 8px;font-size:11px;font-weight:500;display:inline-block}
.mode-row{display:flex;gap:6px;flex-wrap:wrap}
.mode-btn{padding:8px 16px;border-radius:10px;border:1px solid #2a2a3a;font-size:13px;cursor:pointer;background:#111118;color:#888;transition:all .12s}
.mode-btn:hover{border-color:#534ab7;color:#e8e8f0}
.mode-btn.active{background:#1e1a3a;border-color:#7f77dd;color:#a89ef5;font-weight:500}
.top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.sess-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #1a1a24;font-size:13px}
.tstat-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:13px}
.bar-bg{flex:1;background:#1a1a24;border-radius:4px;height:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:#534ab7;transition:width .4s}
.fag-row{display:flex;gap:6px;margin-bottom:10px}
.fag-btn{padding:7px 14px;border-radius:10px;border:1px solid #2a2a3a;font-size:13px;cursor:pointer;background:#111118;color:#888;transition:all .12s}
.fag-btn.active{background:#1e1a3a;border-color:#7f77dd;color:#a89ef5;font-weight:500}
</style>
</head>

<script>

  'o-notasjon':{label:'O-notasjon',color:'#7f77dd',fag:'dat102'},

  'stabel-ko':{label:'Stabel & Kø',color:'#ba7517',fag:'dat102'},
  'rekursjon':{label:'Rekursjon',color:'#e24b4a',fag:'dat102'},
  'grafer':{label:'Grafer',color:'#9f47c4',fag:'dat102'},
  'lenket-liste':{label:'Lenkede lister',color:'#378add',fag:'dat102'},
  'oop':{label:'OOP & Java',color:'#d85a30',fag:'dat102'},
  'generics':{label:'Generics & ADT',color:'#d4537e',fag:'dat102'},
  'sql':{label:'SQL',color:'#0f6e56',fag:'dat107'},
  'jpa':{label:'JPA & ORM',color:'#534ab7',fag:'dat107'},
  'modellering':{label:'Datamodellering',color:'#854f0b',fag:'dat107'}
};
const TLABEL={flervalg:'Flervalg',kode:'Kode',feil:'Finn feilen',fullfør:'Fullfør kode'};
const TCOLOR={flervalg:'#378add',kode:'#1d9e75',feil:'#e24b4a',fullfør:'#ba7517'};
const L=['A','B','C','D'];

const QB=[
// ===================== O-NOTASJON (24+) =====================
{id:1,type:'flervalg',topic:'o-notasjon',diff:'easy',q:'Hvilken funksjon vokser raskest for store n?',opts:['n²','2ⁿ','n log n','n³'],ans:1,exp:'<b>2ⁿ</b> — eksponentiell slår alltid polynomisk. O(1)<O(log n)<O(n)<O(n log n)<O(n²)<O(n³)<O(2ⁿ)<O(n!)',pen:'DAT102 - Eksamensanalyse',hints:['Sammenlign 2¹⁰⁰ vs 100³','Eksponentiell dobles hvert steg','n! > 2ⁿ > n³ > n²']},
{id:2,type:'kode',topic:'o-notasjon',diff:'medium',q:'Hva er tidskompleksiteten?',code:'for (int i = 0; i < n; i++) {\n    for (int j = 0; j < 100; j++) {\n        System.out.println(i + j);\n    }\n}',opts:['O(n²)','O(100n)','O(n)','O(1)'],ans:2,exp:'<b>O(n)</b> — indre løkke alltid 100 ganger, uavhengig av n. O(100n)=O(n).',pen:'DAT102 - Kompleksitetsanalyse',hints:['Indre: j<100, ikke j<n','100 er konstant','O(100n)=O(n)']},
{id:3,type:'kode',topic:'o-notasjon',diff:'medium',q:'Hva er tidskompleksiteten?',code:'int k = n;\nwhile (k > 0) {\n    k = k / 3;\n}',opts:['O(n)','O(n/3)','O(log₃ n)','O(n³)'],ans:2,exp:'<b>O(log₃ n)</b> — k tredeles hvert steg. 27→9→3→1 = 3 steg = log₃(27).',pen:'DAT102 - Kompleksitetsanalyse',hints:['k tredeles hvert steg','Antall ganger til k=0?','27→9→3→1: 3 steg']},
{id:4,type:'kode',topic:'o-notasjon',diff:'hard',q:'Hva er tidskompleksiteten?',code:'public void g(int n) {\n    if (n <= 0) return;\n    g(n/2);\n    g(n/2);\n}',opts:['O(log n)','O(n)','O(n log n)','O(n²)'],ans:1,exp:'<b>O(n)</b> — to kall med n/2. Rekursjonstre ≈ fullt binærtre, 2n-1 noder.',pen:'DAT102 - Rekursjon / Kompleksitetsanalyse',hints:['To kall med n/2','Rekursjonstre = fullt binærtre','2^(log n+1)-1 ≈ 2n']},
{id:5,type:'flervalg',topic:'o-notasjon',diff:'easy',q:'n dobles for O(n²)-algoritme som tok 1 sekund. Ny tid?',opts:['1 sek','2 sek','4 sek','8 sek'],ans:2,exp:'<b>4 sekunder</b> — (2n)²=4n². For O(nᵏ): tid × 2ᵏ.',pen:'DAT102 Eksamen Juni 2022 / Eksamensanalyse',hints:['O(n²): sett 2n for n','(2n)²=4n²','Faktor 4']},
{id:6,type:'kode',topic:'o-notasjon',diff:'hard',q:'Hva er tidskompleksiteten?',code:'for (int i = 1; i < n; i = i * 2) {\n    for (int j = 0; j < n; j++) {\n        // O(1)\n    }\n}',opts:['O(n)','O(n²)','O(n log n)','O(log n)'],ans:2,exp:'<b>O(n log n)</b> — ytre: i fordobles → log n. Indre: n. Totalt: n × log n.',pen:'DAT102 - Kompleksitetsanalyse',hints:['Ytre: i=1,2,4,8... = log₂n iter','Indre: n','log n × n']},
{id:7,type:'kode',topic:'o-notasjon',diff:'medium',q:'Hva er tidskompleksiteten?',code:'void prosess(int n) {\n    for (int i = 1; i <= n; i++) {\n        for (int j = 1; j <= i; j++) {\n            // O(1)\n        }\n    }\n}',opts:['O(n)','O(n log n)','O(n²)','O(2ⁿ)'],ans:2,exp:'<b>O(n²)</b> — triangeltall: 1+2+3+...+n = n(n+1)/2.',pen:'DAT102 - Kompleksitetsanalyse',hints:['Indre: kjøres i ganger','1+2+...+n = n(n+1)/2','n(n+1)/2 = O(n²)']},
{id:8,type:'flervalg',topic:'o-notasjon',diff:'medium',q:'To deler sekvensielt: O(n²) + O(n log n). Total?',opts:['O(n³ log n)','O(n log n)','O(n²)','O(2n²)'],ans:2,exp:'<b>O(n²)</b> — sekvensielle deler adderes. n² dominerer n log n.',pen:'DAT102 - Kompleksitetsanalyse',hints:['Sekvensielle deler adderes','n² dominerer n log n','Dominerende ledd bestemmer']},
{id:9,type:'kode',topic:'o-notasjon',diff:'medium',q:'Hva er tidskompleksiteten?',code:'for (int i = 0; i < n; i++) {\n    for (int j = n; j > 0; j /= 2) {\n        // O(1)\n    }\n}',opts:['O(n)','O(n log n)','O(n²)','O(log n)'],ans:1,exp:'<b>O(n log n)</b> — ytre: O(n). Indre: j halveres → O(log n). n × log n.',pen:'DAT102 - Kompleksitetsanalyse',hints:['Ytre: n','Indre: j halveres → log n','n × log n']},
{id:10,type:'flervalg',topic:'o-notasjon',diff:'medium',q:'Amortisert tidskompleksitet for å legge til element i ArrayList?',opts:['O(n)','O(log n)','O(1)','O(n²)'],ans:2,exp:'<b>O(1) amortisert</b> — utvidelse dobler tabellen, skjer sjeldnere og sjeldnere. Gjennomsnitt over mange operasjoner = O(1).',pen:'DAT102 - Kompleksitetsanalyse',hints:['Tabellen dobles ved utvidelse','Skjer sjeldnere over tid','Gjennomsnitt = O(1)']},
{id:11,type:'flervalg',topic:'o-notasjon',diff:'easy',q:'Hva er tidskompleksiteten til å finne median i sortert tabell?',opts:['O(1)','O(n)','O(log n)','O(n log n)'],ans:0,exp:'<b>O(1)</b> — direkte oppslag på indeks n/2.',pen:'DAT102 - Kompleksitetsanalyse',hints:['Tabellen er allerede sortert','Medianen er på midterste indeks','Direkte tabelloppslag']},
{id:12,type:'kode',topic:'o-notasjon',diff:'hard',q:'Hva er tidskompleksiteten til hemmelig(n)?',code:'void hemmelig(int n) {\n    if (n <= 1) return;\n    for (int i = 0; i < n; i++) System.out.println(i);\n    hemmelig(n/2);\n}',opts:['O(n log n)','O(n)','O(log n)','O(n²)'],ans:1,exp:'<b>O(n)</b> — geometrisk rekke: n + n/2 + n/4 + ... ≈ 2n = O(n).',pen:'DAT102 - Kompleksitetsanalyse',hints:['n arbeid, deretter halvering','n + n/2 + n/4 + ... = ?','Geometrisk rekke ≈ 2n']},
// NYE o-notasjon spørsmål
{id:146,type:'flervalg',topic:'o-notasjon',diff:'medium',q:'WC-kompleksitet for erDelmengdeAv() i LenketMengde?',opts:['O(n)','O(m)','O(n·m)','O(n+m)'],ans:2,exp:'<b>O(n·m)</b> — for hvert av n elementer i this, kaller inneholder() som er O(m). OBS: O(n·m) ≠ O(n²) — to uavhengige variabler.',pen:'DAT102 - Kompleksitetsanalyse',hints:['For hvert element i this: kall inneholder()','inneholder() = O(m) WC','n × m = O(n·m)']},
{id:147,type:'flervalg',topic:'o-notasjon',diff:'medium',q:'Hva er BC-kompleksitet for inneholder() i LenketMengde?',opts:['O(n)','O(1)','O(log n)','O(n²)'],ans:1,exp:'<b>O(1)</b> — beste tilfelle: elementet er første node. Sammenligning treffer med en gang.',pen:'DAT102 - Kompleksitetsanalyse',hints:['BC = beste tilfelle','Når stopper søket tidligst?','Første element matcher']},
{id:148,type:'flervalg',topic:'o-notasjon',diff:'medium',q:'WC for fjern() i LenketMengde vs. TabellMengde?',opts:['Begge O(n)','LenketMengde O(1), TabellMengde O(n)','LenketMengde O(n), TabellMengde O(1)','Begge O(1)'],ans:0,exp:'<b>Begge O(n) WC</b> — elementet kan være sist. Men LenketMengde har O(1) BC (fjerne første). TabellMengde alltid O(n).',pen:'DAT102 - Kompleksitetsanalyse',hints:['WC = verste tilfelle','Siste element er verste','Begge traverserer i WC']},
{id:149,type:'kode',topic:'o-notasjon',diff:'hard',q:'Hva er tidskompleksiteten?',code:'for (int i = 0; i < n; i++) {\n    for (int j = i; j < n; j++) {\n        // O(1)\n    }\n}',opts:['O(n)','O(n log n)','O(n²)','O(n³)'],ans:2,exp:'<b>O(n²)</b> — sum: (n-0)+(n-1)+(n-2)+...+1 = n(n+1)/2. Likt triangeltall-mønster.',pen:'DAT102 - Kompleksitetsanalyse',hints:['j starter på i, ikke 0','n + (n-1) + ... + 1','n(n+1)/2 = O(n²)']},
{id:150,type:'flervalg',topic:'o-notasjon',diff:'easy',q:'Hva er O(n) + O(n²)?',opts:['O(n³)','O(n²)','O(2n)','O(n·n²)'],ans:1,exp:'<b>O(n²)</b> — dominerende ledd bestemmer. O(n) "forsvinner" mot O(n²).',pen:'DAT102 - Kompleksitetsanalyse',hints:['Adder og finn dominerende','n < n²','n² dominerer']},
{id:151,type:'flervalg',topic:'o-notasjon',diff:'medium',q:'f(n) = 40n log₂n + 20n² + 30n + 1000. O-notasjon?',opts:['O(n²)','O(n log n)','O(n)','O(n³)'],ans:0,exp:'<b>O(n²)</b> — 20n² er dominerende ledd. Alle andre vokser saktere.',pen:'DAT102 Eksamen Juni 2022',hints:['Hvilke ledd finnes?','n², n log n, n, konstant','Hva vokser raskest?']},
{id:152,type:'flervalg',topic:'o-notasjon',diff:'medium',q:'Binærsøk i sortert tabell: tidskompleksitet?',opts:['O(n)','O(log n)','O(1)','O(n log n)'],ans:1,exp:'<b>O(log n)</b> — halverer søkerommet hvert steg. Maks log₂(n) sammenligninger.',pen:'DAT102 - Rekursjon / Eksamensanalyse',hints:['Halverer hvert steg','n=1000: maks 10 steg','2^10=1024: log₂(1000)≈10']},
{id:153,type:'flervalg',topic:'o-notasjon',diff:'hard',q:'Plasskompleksitet for rekursiv funksjon som går n nivåer dypt?',opts:['O(1)','O(log n)','O(n)','O(n²)'],ans:2,exp:'<b>O(n)</b> — hvert rekursivt kall legger et stack frame. n nivåer = n frames på call stack.',pen:'DAT102 - Rekursjon',hints:['Hvert kall tar plass på call stack','n nivåer = n frames','O(n) stakkplass']},
{id:154,type:'flervalg',topic:'o-notasjon',diff:'medium',q:'Hva skjer med tidskompleksiteten om n tredobles for O(n²)?',opts:['Tredobles','Seksdobles','Nidobles','Niogdobles'],ans:2,exp:'<b>Nidobles</b> — (3n)²=9n². Faktor 9 = 3².',pen:'DAT102 - Kompleksitetsanalyse',hints:['O(n²): sett 3n for n','(3n)²=9n²','Faktor 9']},
{id:155,type:'kode',topic:'o-notasjon',diff:'medium',q:'Hva er tidskompleksiteten?',code:'int sum = 0;\nfor (int i = 1; i <= n; i *= 2) {\n    sum += i;\n}',opts:['O(n)','O(log n)','O(n log n)','O(1)'],ans:1,exp:'<b>O(log n)</b> — i fordobles: 1,2,4,8,... Antall iterasjoner = log₂(n).',pen:'DAT102 - Kompleksitetsanalyse',hints:['i fordobles hvert steg','1,2,4,8,...,n: log₂(n) steg','O(log n)']},
{id:156,type:'flervalg',topic:'o-notasjon',diff:'easy',q:'Hvilken er raskest for store n: O(n log n) eller O(n²)?',opts:['O(n log n)','O(n²)','De er like','Avhenger av data'],ans:0,exp:'<b>O(n log n)</b> — log n vokser mye saktere enn n, så n log n < n². For n=1000: n log n ≈ 10000, n² = 1000000.',pen:'DAT102 - Kompleksitetsanalyse',hints:['n=1000: log₂(1000)≈10','n log n ≈ 10000','n² = 1000000']},
{id:157,type:'kode',topic:'o-notasjon',diff:'hard',q:'Hva er WC-kompleksitet for union() i LenketMengde når this har n og annenMengde har m elementer?',opts:['O(n+m)','O(n·m)','O(n(n+m))','O(n²)'],ans:2,exp:'<b>O(n(n+m))</b> — leggTil() kaller inneholder() (O(n) WC) for hvert element. Løkke 1: n×O(n). Løkke 2: m×O(n). Totalt O(n²+nm)=O(n(n+m)).',pen:'DAT102 - Kompleksitetsanalyse',hints:['leggTil() kaller inneholder()','inneholder() er O(n) WC','n×O(n) + m×O(n) = O(n(n+m))']},
{id:158,type:'flervalg',topic:'o-notasjon',diff:'medium',q:'Hva er kompleksiteten til HashSet.contains()?',opts:['O(n)','O(log n)','O(1) amortisert','O(n²)'],ans:2,exp:'<b>O(1) amortisert</b> — hash-funksjon beregner indeks direkte. Sjelden kollisjon med god hash-funksjon.',pen:'DAT102 - Hashing / Kompleksitetsanalyse',hints:['Hash = direkte beregning','Ikke lineært søk','O(1) gjennomsnittlig']},

// ===================== SORTERING (26+) =====================
{id:13,type:'flervalg',topic:'sortering',diff:'easy',q:'Hva betyr "stabil" sorteringsalgoritme?',opts:['Alltid O(n log n)','Endrer ikke relativ rekkefølge for like nøkler','Bruker O(1) minne','Like rask alltid'],ans:1,exp:'<b>Stabilitet</b> = like nøkler beholder original innbyrdes rekkefølge. Merge Sort er stabil. Quick Sort og Selection Sort er ikke.',pen:'DAT102 - Avansert sortering',hints:['To elementer med lik nøkkel','Original rekkefølge bevares?','Stabil = ja']},
{id:14,type:'kode',topic:'sortering',diff:'medium',q:'Tabellen etter første pass av Selection Sort på [10,5,8,2,7]?',opts:['[5,10,8,2,7]','[2,5,8,10,7]','[2,10,8,5,7]','[5,8,2,7,10]'],ans:2,exp:'<b>[2,10,8,5,7]</b> — finner min (2, plass 3), bytter med plass 0 (10).',pen:'DAT102 - Sortering',hints:['Finn minste i hele tabellen','Minste er 2, plass 3','Bytt 2 med 10']},
{id:15,type:'kode',topic:'sortering',diff:'easy',q:'Hvilken algoritme er dette?',code:'for (int i = 0; i < n - 1; i++) {\n    int min = i;\n    for (int j = i + 1; j < n; j++) {\n        if (a[j] < a[min]) min = j;\n    }\n    // swap a[i] og a[min]\n}',opts:['Bubble Sort','Insertion Sort','Selection Sort','Quick Sort'],ans:2,exp:'<b>Selection Sort</b> — finner minimum i usortert del, bytter til riktig plass. Alltid O(n²).',pen:'DAT102 - Sortering',hints:['Finner minste i usortert del','min = indeks til minste','Bytter til riktig plass']},
{id:16,type:'flervalg',topic:'sortering',diff:'medium',q:'Hva er den største ulempen med Merge Sort vs Quick Sort?',opts:['Tregere i snitt','Ikke stabil','Krever O(n) ekstra minne','Dårligere worst-case'],ans:2,exp:'<b>O(n) ekstra minne</b> til hjelpetabell. Quick Sort er in-place (O(log n) stakkplass).',pen:'DAT102 - Avansert sortering',hints:['Fletting trenger buffer','Quick Sort: in-place','Merge Sort: O(n) ekstra']},
{id:17,type:'flervalg',topic:'sortering',diff:'medium',q:'Hvilken algoritme er O(n) i beste tilfelle?',opts:['Merge Sort','Quick Sort','Insertion Sort','Selection Sort'],ans:2,exp:'<b>Insertion Sort</b> — O(n) for nesten sortert input. Selection Sort alltid O(n²). Merge Sort alltid O(n log n).',pen:'DAT102 - Sortering / Eksamensanalyse',hints:['Nesten sortert input','Én sammenligning per element BC','O(n) × O(1)']},
{id:18,type:'flervalg',topic:'sortering',diff:'medium',q:'Quicksort worst-case?',opts:['O(n log n)','O(n)','O(n²)','O(log n)'],ans:2,exp:'<b>O(n²)</b> — dårlig pivotvalg: alltid min/max. Partisjoneringen deler 0 og n-1.',pen:'DAT102 - Avansert sortering',hints:['Dårlig pivotvalg','Deler i 0 og n-1','n+(n-1)+...+1 = n(n+1)/2']},
{id:19,type:'kode',topic:'sortering',diff:'medium',q:'Hva gjør koden?',code:'for (int i = 0; i < n / 2; i++) {\n    int temp = tab[i];\n    tab[i] = tab[n - 1 - i];\n    tab[n - 1 - i] = temp;\n}',opts:['Sorterer','Finner størst','Reverserer','Sletter halve'],ans:2,exp:'<b>Reverserer</b> — bytter tab[i] ↔ tab[n-1-i] til midten. O(n/2)=O(n).',pen:'DAT102 - Sortering',hints:['tab[i] byttes med tab[n-1-i]','i fra start, n-1-i fra slutt','De møtes i midten']},
{id:20,type:'kode',topic:'sortering',diff:'easy',q:'Etter første runde av Bubble Sort på [5,1,4,2,8] — siste element?',opts:['5','1','2','8'],ans:3,exp:'<b>8</b> — Bubble Sort "bobler" størst til slutten i første pass.',pen:'DAT102 - Sortering',hints:['Bubble Sort: størst bobler til slutt','Første pass plasserer størst sist','Størst i [5,1,4,2,8] = ?']},
{id:21,type:'flervalg',topic:'sortering',diff:'hard',q:'Hva bruker Collections.sort() og Arrays.sort() i Java?',opts:['Quick Sort','Heap Sort','TimSort (hybridalgoritme)','Merge Sort'],ans:2,exp:'<b>TimSort</b> — hybrid av Merge Sort og Insertion Sort. O(n log n) WC, O(n) BC.',pen:'DAT102 - Avansert sortering',hints:['Java bruker ikke ren Quicksort','Hybrid: Merge Sort + Insertion Sort','TimSort']},
{id:22,type:'kode',topic:'sortering',diff:'medium',q:'Hvor mange skift trengs for å sette 3 inn i [2,4,6,8] med Insertion Sort?',opts:['1','2','3','4'],ans:2,exp:'<b>3 skift</b> — 3 flyttes forbi 8, 6, 4. Plasseres etter 2.',pen:'DAT102 - Sortering',hints:['3 skal mellom 2 og 4','Flyttes forbi 8, 6, 4','Tre elementer flyttes']},
{id:23,type:'flervalg',topic:'sortering',diff:'medium',q:'Tidskompleksitet for å bygge en heap (build-heap) fra usortert tabell?',opts:['O(n log n)','O(n²)','O(n)','O(1)'],ans:2,exp:'<b>O(n)</b> — matematisk analyse viser at summen av alle heapify-kall er O(n), ikke O(n log n).',pen:'DAT102 - Eksamensanalyse',hints:['Ikke O(n log n) selv om heapify er O(log n)','De fleste noder er nær bunnen','Summen av alle heapify = O(n)']},
{id:24,type:'flervalg',topic:'sortering',diff:'hard',q:'Hva er den teoretiske nedre grensen for sammenligningsbasert sortering?',opts:['O(n)','O(n²)','O(n log n)','O(1)'],ans:2,exp:'<b>O(n log n)</b> — bevist med beslutningstreet. Ikke-sammenligningsbasert (Radix) kan gjøre O(n).',pen:'DAT102 - Avansert sortering',hints:['Kan vi sortere raskere enn n log n?','Nei — bevist matematisk','Radix Sort unngår dette']},
// NYE sortering
{id:159,type:'flervalg',topic:'sortering',diff:'medium',q:'Eksamen 2022: Hvilken algoritme er best for nesten sortert tabell?',opts:['Haugsortering','Utvalgssortering','Sortering ved innsetting','Flettesortering'],ans:2,exp:'<b>Insertion Sort</b> — O(n) BC. Heap Sort og Selection Sort alltid O(n log n)/O(n²).',pen:'DAT102 Eksamen Juni 2022',hints:['Nesten sortert = O(n) BC','Hvilken algoritme?','Insertion Sort!']},
{id:160,type:'flervalg',topic:'sortering',diff:'easy',q:'Hva er ordenen til Flettesortering (Merge Sort)?',opts:['O(n)','O(n²)','O(n log n) alltid','O(n log n) best, O(n²) worst'],ans:2,exp:'<b>O(n log n) alltid</b> — uansett input. log n nivåer × O(n) fletting = O(n log n).',pen:'DAT102 Eksamen Juni 2022',hints:['Merge Sort deler alltid i halvdeler','log n nivåer, O(n) per nivå','Ingen best/worst variasjon']},
{id:161,type:'flervalg',topic:'sortering',diff:'easy',q:'Hva er ordenen til Utvalgssortering (Selection Sort)?',opts:['O(n)','O(n log n)','O(n²)','O(1)'],ans:2,exp:'<b>O(n²) alltid</b> — uansett input. Alltid n-1 kall til indre løkke.',pen:'DAT102 Eksamen Juni 2022',hints:['Alltid to nestede løkker','Ingen BC-fordel','Alltid O(n²)']},
{id:162,type:'flervalg',topic:'sortering',diff:'medium',q:'Hva er ordenen til Haugsortering (Heap Sort)?',opts:['O(n)','O(n log n)','O(n²)','O(2ⁿ)'],ans:1,exp:'<b>O(n log n) alltid</b> — build-heap O(n) + n×siv-ned O(log n) = O(n log n). Stabil? Nei.',pen:'DAT102 Eksamen Juni 2022',hints:['build-heap = O(n)','n×siv-ned = n×O(log n)','O(n log n) total']},
{id:163,type:'kode',topic:'sortering',diff:'medium',q:'Hva er dette?',code:'for (int i = 1; i < n; i++) {\n    int key = a[i];\n    int j = i - 1;\n    while (j >= 0 && a[j] > key) {\n        a[j+1] = a[j];\n        j--;\n    }\n    a[j+1] = key;\n}',opts:['Selection Sort','Bubble Sort','Insertion Sort','Merge Sort'],ans:2,exp:'<b>Insertion Sort</b> — tar neste element (key), skifter større elementer høyre, setter key på riktig plass.',pen:'DAT102 - Sortering',hints:['key = neste element','Skifter elementer høyre','Setter key på riktig plass']},
{id:164,type:'kode',topic:'sortering',diff:'hard',q:'Hva er tidskompleksiteten?',code:'void sorter(int[] a, int n) {\n    for (int i = 0; i < n - 1; i++) {\n        for (int j = 0; j < n - i - 1; j++) {\n            if (a[j] > a[j+1]) {\n                int tmp = a[j];\n                a[j] = a[j+1];\n                a[j+1] = tmp;\n            }\n        }\n    }\n}',opts:['O(n)','O(n log n)','O(n²)','O(n³)'],ans:2,exp:'<b>O(n²)</b> — Bubble Sort. 1+2+...+(n-1) = n(n-1)/2 = O(n²).',pen:'DAT102 - Sortering',hints:['To nestede løkker','1+2+...+n-1 = n(n-1)/2','O(n²)']},
{id:165,type:'flervalg',topic:'sortering',diff:'medium',q:'Merge Sort: er det en stabil sorteringsalgoritme?',opts:['Ja','Nei','Avhenger av implementasjon','Avhenger av data'],ans:0,exp:'<b>Ja</b> — Merge Sort er stabil. Like elementer beholder relativ rekkefølge i flette-steget.',pen:'DAT102 - Avansert sortering',hints:['Stabilitet = like nøkler beholder rekkefølge','Flett-operasjonen...','...bevarer relative rekkefølgen']},
{id:166,type:'flervalg',topic:'sortering',diff:'medium',q:'Quick Sort: er det en in-place algoritme?',opts:['Ja','Nei — krever O(n) ekstra','Nei — krever O(log n) ekstra','Avhenger av pivot'],ans:0,exp:'<b>Ja, in-place</b> — partisjonering skjer i originaltabellen. Bare O(log n) stakkplass for rekursjonen.',pen:'DAT102 - Avansert sortering',hints:['In-place = endrer originaltabellen','Quick Sort bytter i originalen','Bare rekursjons-stakkplass']},
{id:167,type:'flervalg',topic:'sortering',diff:'hard',q:'Hva er best-case for Quick Sort med god pivotvalg?',opts:['O(n)','O(n log n)','O(n²)','O(log n)'],ans:1,exp:'<b>O(n log n)</b> — med god pivot (median): alltid O(n log n). BC = WC = O(n log n) med median-av-tre.',pen:'DAT102 - Avansert sortering',hints:['God pivot: deler i to like halvdeler','log n nivåer','n arbeid per nivå = O(n log n)']},
{id:168,type:'kode',topic:'sortering',diff:'medium',q:'Antall sammenligninger i Selection Sort på n elementer?',opts:['n-1','n(n-1)/2','n log n','n²'],ans:1,exp:'<b>n(n-1)/2</b> — (n-1)+(n-2)+...+1 = n(n-1)/2. Alltid, uansett input.',pen:'DAT102 - Sortering',hints:['Pass 1: n-1 sammenligninger','Pass 2: n-2','Sum: n(n-1)/2']},
{id:169,type:'flervalg',topic:'sortering',diff:'medium',q:'Radix Sort: kan den være raskere enn O(n log n)?',opts:['Nei, umulig matematisk','Ja, under visse forutsetninger','Bare for negativt tall','Bare for store n'],ans:1,exp:'<b>Ja</b> — Radix Sort er ikke sammenligningsbasert. Med d sifre og k mulige verdier: O(d·(n+k)). Kan være O(n) om d og k er konstanter.',pen:'DAT102 - Sortering',hints:['Radix: ikke sammenligningsbasert','Den teoretiske grensen O(n log n) gjelder kun sammenligningsbasert','d og k som konstanter → O(n)']},
{id:170,type:'flervalg',topic:'sortering',diff:'easy',q:'Hvilken algoritme er IKKE stabil?',opts:['Merge Sort','Insertion Sort','Selection Sort','Counting Sort'],ans:2,exp:'<b>Selection Sort</b> — bytting av ikke-naboer kan ødelegge relativ rekkefølge for like elementer.',pen:'DAT102 - Avansert sortering',hints:['Stabil = like nøkler beholder rekkefølge','Selection Sort bytter vilkårlig','Fjerntliggende bytte = ustabil']},

{id:25,type:'kode',topic:'hashing',diff:'easy',q:'h(x) = x % 7. Indeks for 25?',opts:['1','4','3','2'],ans:1,exp:'<b>4</b> — 25 = 3×7+4, rest=4.',pen:'DAT102 - Hashing',hints:['25 % 7 = ?','3×7=21','25-21=4']},

{id:27,type:'flervalg',topic:'hashing',diff:'medium',q:'Linear probing, h(k)=k%10, indeks 3 opptatt. Indeks for 23?',opts:['3','4','0','5'],ans:1,exp:'<b>4</b> — h(23)=3 (opptatt). Neste: (3+1)%10=4.',pen:'DAT102 - Hashing',hints:['h(23)=3','3 opptatt → neste','(3+1)%10=4']},
{id:28,type:'flervalg',topic:'hashing',diff:'hard',q:'Hvorfor er primtall best som tabellstørrelse?',opts:['Raskere beregning','Jevnere fordeling ved mønstre i nøklene','Mindre minne','Obligatorisk'],ans:1,exp:'<b>Jevnere fordeling.</b> 4,8,12...%8 → kun 0 og 4! Mod 7: alle 7 plasser.',pen:'DAT102 - Hashing',hints:['Prøv 4,8,12...%8','Bare 0 og 4 av 8!','Mod 7: alle plasser']},
{id:29,type:'flervalg',topic:'hashing',diff:'medium',q:'Hva er "lazy deletion"?',opts:['Slette ved rehash','Markere FJERNET i stedet for null','Utsette slettinger','Slette om natten'],ans:1,exp:'<b>FJERNET-markering.</b> null="stopp søket". FJERNET="fortsett søket".',pen:'DAT102 - Hashing',hints:['null vs FJERNET','null stopper probe-kjeden','FJERNET: fortsett søket']},
{id:30,type:'feil',topic:'hashing',diff:'hard',q:'Hva er feilen?',code:'int hashIndex = key.hashCode() % hashTabell.length;',opts:['Feil operator','NullPointerException','hashIndex kan bli negativ','length feil'],ans:2,exp:'<b>Negativ hashkode!</b> Java: -5%17=-5. Fix: if (hashIndex<0) hashIndex += hashTabell.length;',pen:'DAT102 - Hashing',hints:['hashCode() kan returnere negativt','Java: negativ%positiv = negativt','-5%17=-5 — ikke gyldig indeks']},
{id:31,type:'flervalg',topic:'hashing',diff:'medium',q:'Separate chaining: hva skjer ved kollisjon?',opts:['Leter etter ledig plass','Sletter gammel verdi','Legger i lenket liste på samme indeks','Tabellen dobles'],ans:2,exp:'<b>Lenket liste per indeks</b> — separate chaining lagrer kolliderende elementer i lister.',pen:'DAT102 - Hashing',hints:['Chaining = kjeding','Lenket liste per indeks','Lastfaktor kan > 1']},
{id:32,type:'flervalg',topic:'hashing',diff:'medium',q:'Hva er "primary clustering" et problem for?',opts:['Separate chaining','Linear probing','Double hashing','Quadratic probing'],ans:1,exp:'<b>Linear probing</b> — lange sekvenser av fylte indekser vokser, gjør søk tregere.',pen:'DAT102 - Hashing',hints:['Klyngedannelse','Sekvenser vokser','Lineær probing = mest utsatt']},
{id:33,type:'flervalg',topic:'hashing',diff:'hard',q:'Hva skjer i Java HashMap ved lastfaktor > 0.75?',opts:['Kastes feil','Tabellen dobles og rehashes','Gamle slettes','Lagres i liste'],ans:1,exp:'<b>Rehashing</b> — ny tabell (dobbel størrelse), alle re-hashes. Amortisert O(1).',pen:'DAT102 - Hashing',hints:['Rehash = ny større tabell','Alle elementer flyttes','Dobling amortisert O(1)']},
{id:34,type:'kode',topic:'hashing',diff:'medium',q:'Hva returnerer map.get("DK53401") etter disse kallene?',code:'HashMap<String, Bil> reg = new HashMap<>();\nreg.put("DK53401", bilA);\nBil b = reg.get("DK53401");',opts:['null','bilA','Kopi av bilA','Exception'],ans:1,exp:'<b>bilA</b> — get() returnerer referansen, ikke en kopi.',pen:'DAT102 - Hashing',hints:['HashMap lagrer referanser','get() returnerer verdien','Ikke kopi, men referansen']},
// NYE hashing
{id:171,type:'flervalg',topic:'hashing',diff:'medium',q:'Hva er den gyldne regelen for hashCode() og equals()?',opts:['Alltid implementer begge','Hvis a.equals(b), må a.hashCode()==b.hashCode()','Hvis a.hashCode()==b.hashCode(), er a.equals(b)','hashCode() trenger ikke stemme med equals()'],ans:1,exp:'<b>Hvis equals() er lik, MÅ hashCode() være lik.</b> Omvendt er ikke krav (kollisjoner er OK). Brudd: HashMap kan miste objekter.',pen:'DAT102 - Hashing',hints:['equals() lik → hashCode() lik','Omvendt: ikke krav (kollisjoner OK)','Uten dette: HashMap mister objekter']},
{id:172,type:'flervalg',topic:'hashing',diff:'medium',q:'Hva er forskjellen mellom HashMap og Hashtable i Java?',opts:['Ingen','HashMap er trådsikker, Hashtable ikke','Hashtable er trådsikker, HashMap ikke','HashMap tillater null-nøkler, Hashtable ikke'],ans:2,exp:'<b>Hashtable er trådsikker (synchronized), HashMap er det ikke.</b> HashMap tillater null-nøkkel og null-verdi. Hashtable tillater ikke null. HashMap er raskere (ikke synkronisert).',pen:'DAT102 - Hashing',hints:['Synchronized = trådsikker','HashMap: raskere, ikke trådsikker','Hashtable: gammel, trådsikker']},
{id:173,type:'flervalg',topic:'hashing',diff:'medium',q:'HashSet vs TreeSet: hva er O(1) for HashSet men O(log n) for TreeSet?',opts:['Iterering','contains()','Konstruksjon','size()'],ans:1,exp:'<b>contains()</b> — HashSet: O(1) via hash. TreeSet: O(log n) via balansert binærtre. TreeSet gir sortert rekkefølge.',pen:'DAT102 - Kompleksitetsanalyse / Hashing',hints:['HashSet: hash-basert','TreeSet: balansert tre','contains(): O(1) vs O(log n)']},
{id:174,type:'kode',topic:'hashing',diff:'medium',q:'Hva er probe-sekvensen for h(k)=k%5, k=7, med linear probing og plassene 2 og 3 opptatt?',opts:['2,3,4','3,4','2,3,4,5','2 (direkte)'],ans:0,exp:'<b>2,3,4</b> — h(7)=7%5=2 (opptatt). Prøv 3 (opptatt). Prøv 4 (ledig). Lander på 4.',pen:'DAT102 - Hashing',hints:['h(7)=7%5=2','2 opptatt → 3','3 opptatt → 4 (ledig)']},
{id:175,type:'flervalg',topic:'hashing',diff:'hard',q:'LinkedHashMap vs HashMap: hva er fordelen med LinkedHashMap?',opts:['Raskere get()','Bevarer innsettingsrekkefølge','Trådsikker','Bruker mindre minne'],ans:1,exp:'<b>Bevarer innsettingsrekkefølge.</b> HashMap: vilkårlig. LinkedHashMap: huske rekkefølgen via en ekstra lenket liste. Litt tregere og mer minne enn HashMap.',pen:'DAT102 - Hashing',hints:['HashMap: vilkårlig rekkefølge','LinkedHashMap: husker rekkefølge','Ekstra lenket liste per element']},
{id:176,type:'flervalg',topic:'hashing',diff:'medium',q:'Hva er formålet med dobbel hashing sammenlignet med lineær probing?',opts:['Raskere beregning','Unngå primær klynging','Bruke mindre tabell','Slippe modulo'],ans:1,exp:'<b>Unngå primær klynging.</b> Andre probe-sekvens basert på en andre hash-funksjon, gir mer variasjon i probe-steg.',pen:'DAT102 - Hashing',hints:['Lineær probing: klynger seg','Dobbel hashing: variabelt steg','Variasjon = bedre fordeling']},
{id:177,type:'kode',topic:'hashing',diff:'hard',q:'Hva returnerer size() her?',code:'Set<Integer> s = new HashSet<>();\ns.add(1); s.add(2); s.add(1); s.add(3);',opts:['4','3','2','1'],ans:1,exp:'<b>3</b> — Set tillater ikke duplikater. add(1) to ganger: bare én 1 lagres. {1,2,3} = 3 elementer.',pen:'DAT102 - Hashing',hints:['Set: ingen duplikater','1 legges til to ganger','Unike: {1,2,3}']},
{id:178,type:'kode',topic:'hashing',diff:'medium',q:'Hva skjer her?',code:'HashMap<String, Integer> map = new HashMap<>();\nmap.put("A", 10);\nmap.put("B", 20);\nmap.put("A", 30);\nSystem.out.println(map.get("A"));',opts:['10','20','30','null'],ans:2,exp:'<b>30</b> — nøkler er unike. put("A",30) overskriver put("A",10).',pen:'DAT102 - Hashing',hints:['HashMap: unike nøkler','put() overskriver','Siste put() vinner']},
{id:179,type:'flervalg',topic:'hashing',diff:'medium',q:'Hva er ConcurrentHashMap og når brukes det?',opts:['Raskere enn HashMap','Trådsikker versjon av HashMap for flertrådet kode','Sortert HashMap','HashMap med primtall-størrelse'],ans:1,exp:'<b>Trådsikker HashMap.</b> Brukes i flertrådet kode uten ekstern synkronisering. Mer effektiv enn Hashtable (segmentert låsing).',pen:'DAT102 - Hashing',hints:['Flertrådede programmer','Trådsikker = concurrent','ConcurrentHashMap']},

{id:35,type:'flervalg',topic:'traer',diff:'easy',q:'I Min-heap: hvor er alltid det minste?',opts:['Venstre blad','Høyre blad','Roten','Nederste nivå'],ans:2,exp:'<b>Roten</b> — heap-egenskap: forelder ≤ barn.',pen:'DAT102 - Eksamensanalyse',hints:['Min-heap: forelder ≤ barn','Minste ≤ alt','Øverste = ?']},
{id:36,type:'kode',topic:'traer',diff:'medium',q:'Sett inn 5,8,6 i tomt BST. Hva er root.right.left.data?',opts:['5','8','6','null'],ans:2,exp:'<b>6</b> — 5=rot. 8>5→høyre. 6<8→venstre for 8.',pen:'DAT102 - Eksamensanalyse (BST)',hints:['5 er rot','8>5→høyre for rot','6>5 men 6<8']},
{id:37,type:'kode',topic:'traer',diff:'medium',q:'Hva gjør funksjonen?',code:'int funksjon(Node t) {\n    if (t == null) return 0;\n    return 1 + Math.max(funksjon(t.left),\n                       funksjon(t.right));\n}',opts:['Teller noder','Teller blader','Finner høyden','Finner summen'],ans:2,exp:'<b>Finner høyden</b> — 1+max(venstre,høyre). null→0.',pen:'DAT102 - Eksamensanalyse',hints:['null→0','Max velger dypeste','1 per nivå opp']},
{id:38,type:'flervalg',topic:'traer',diff:'medium',q:'AVL-tre: maks høydeforskjell mellom undertrær?',opts:['0','1','2','Ingen grense'],ans:1,exp:'<b>1</b> — |h(h)-h(v)| ≤ 1. Brudd → rotasjon.',pen:'DAT102 - Eksamensanalyse (AVL)',hints:['Balansefaktor = h(h)-h(v)','Grense for rotasjon?','|balansefaktor| ≤ 1']},
{id:39,type:'kode',topic:'traer',diff:'medium',q:'Hva gjør traverseringen?',code:'void traverse(Node t) {\n    if (t == null) return;\n    traverse(t.right);\n    System.out.print(t.data + " ");\n    traverse(t.left);\n}',opts:['BST stigende','BST synkende','Kun blader','Pre-order'],ans:1,exp:'<b>Synkende</b> — omvendt in-order: høyre→rot→venstre.',pen:'DAT102 - Eksamensanalyse (BST)',hints:['Standard: venstre→rot→høyre=stigende','Denne: høyre→rot→venstre','Omvendt = synkende']},
{id:40,type:'kode',topic:'traer',diff:'medium',q:'Hva gjør metoden?',code:'public int g(Node t) {\n    if (t == null) return 0;\n    if (t.left == null && t.right == null)\n        return 1;\n    return g(t.left) + g(t.right);\n}',opts:['Finner høyde','Teller alle','Teller bladnoder','Sjekker balanse'],ans:2,exp:'<b>Teller bladnoder</b> — bladnode=ingen barn→1, null→0.',pen:'DAT102 - Eksamensanalyse',hints:['null→0','Ingen barn→?','Blad = ingen barn']},
{id:41,type:'flervalg',topic:'traer',diff:'medium',q:'BST: hva erstatter vanligvis en slettet node med to barn?',opts:['Rotnoden','In-order successor (minste i høyre undertre)','Vilkårlig blad','Størst i hele treet'],ans:1,exp:'<b>In-order successor</b> = minste i høyre undertre (gå høyre, deretter venstre til bunns).',pen:'DAT102 - Eksamensanalyse (BST)',hints:['In-order = sortert rekkefølge','Neste i sortert rekkefølge','Gå høyre, deretter venstre til bunn']},
{id:42,type:'flervalg',topic:'traer',diff:'medium',q:'Hva kjennetegner et komplett binærtre?',opts:['Alle noder har 0 eller 2 barn','Alle nivåer fylt, siste fra venstre','Alle blader lik verdi','Eksakt 2ⁿ noder'],ans:1,exp:'<b>Alle nivåer fylt unntatt siste, fylt fra venstre.</b> Heap bruker komplett binærtre.',pen:'DAT102 - Eksamensanalyse',hints:['Nivåer fylt fra venstre','Siste nivå ikke nødvendigvis fullt','Heap = komplett binærtre']},
{id:43,type:'flervalg',topic:'traer',diff:'medium',q:'Hva kjennetegner 2-3 trær?',opts:['En 2-node har 3 barn','Alle blader på samme dybde','Identisk med BST','Vokser alltid ned'],ans:1,exp:'<b>Alle blader på samme dybde</b> — alltid perfekt balansert. O(log n) garantert.',pen:'DAT102 - Eksamensanalyse (2-3 tre)',hints:['Perfekt balanse','Garantert O(log n)','Alle blader på...']},
{id:44,type:'flervalg',topic:'traer',diff:'hard',q:'3-node i 2-3 tre er full. Hva skjer ved innsetting?',opts:['Overskriver','Forkastes','Noden splittes, midterste bobles opp','Treet sletter rot'],ans:2,exp:'<b>Splitt og boble</b> — 3+1=4 nøkler: midterste bobles til forelder. Kan propagere til rot.',pen:'DAT102 - Eksamensanalyse (2-3 tre)',hints:['4 nøkler er for mye','Midterste bobles opp','Treet vokser oppover']},
{id:45,type:'kode',topic:'traer',diff:'medium',q:'Sett inn 60 i Max-heap [50,30,40,10,20]. Ny rot?',opts:['50','40','60','10'],ans:2,exp:'<b>60</b> — legg 60 bakerst, boble opp. 60>40→bytt. 60>50→bytt. 60 er ny rot.',pen:'DAT102 - Eksamensanalyse (Heap)',hints:['Legg bakerst','Boble opp','60 > alle']},
{id:46,type:'flervalg',topic:'traer',diff:'hard',q:'Maks høyde rød-svart tre med n noder?',opts:['O(n)','O(√n)','2×log₂(n+1)','Eksakt log₂n'],ans:2,exp:'<b>2×log₂(n+1)</b> — garantert innenfor faktor 2 av optimal.',pen:'DAT102 - Eksamensanalyse',hints:['Rød-svart: farge-regler','Garantert innenfor faktor 2','2×log₂(n+1)']},
{id:47,type:'flervalg',topic:'traer',diff:'easy',q:'In-order traversering av BST gir?',opts:['Tilfeldig rekkefølge','Stigende rekkefølge','Synkende rekkefølge','Kun blader'],ans:1,exp:'<b>Stigende rekkefølge</b> — in-order: venstre→rot→høyre. BST: alltid minste til største.',pen:'DAT102 - Eksamensanalyse (BST)',hints:['In-order: venstre→rot→høyre','BST: venstre<rot<høyre','Minste til største']},
{id:48,type:'flervalg',topic:'traer',diff:'medium',q:'Fjerning av rot fra Max-heap?',opts:['Søk etter ny max','Flytt siste til rot → siv ned','Rotasjon med venstre','Splitt heapen'],ans:1,exp:'<b>Flytt siste til rot, siv ned</b> — siv ned: sammenlign med største barn, bytt om nødvendig. O(log n).',pen:'DAT102 - Eksamensanalyse (Heap)',hints:['Siste node erstatter rot','Siv ned','O(log n)']},

{id:181,type:'kode',topic:'traer',diff:'medium',q:'Sett inn 10,5,17,2,20,15 i tomt BST. Hva er høyre barn av 17?',opts:['5','15','20','null'],ans:2,exp:'<b>20</b> — 10=rot. 17→høyre for rot. 20>17→høyre for 17.',pen:'DAT102 Eksamen Juni 2022',hints:['Start fra rot=10','17>10→høyre for rot','20>17→høyre for 17']},
{id:182,type:'flervalg',topic:'traer',diff:'medium',q:'Pre-order traversering: rekkefølge?',opts:['Venstre→rot→høyre','Rot→venstre→høyre','Venstre→høyre→rot','Høyre→rot→venstre'],ans:1,exp:'<b>Rot→venstre→høyre</b> — "pre" = rot FØR barn. Brukes f.eks. til å kopiere et tre.',pen:'DAT102 - Eksamensanalyse',hints:['"pre" = rot FØR','Rot, deretter barn','Rot→venstre→høyre']},
{id:183,type:'flervalg',topic:'traer',diff:'medium',q:'Post-order traversering: rekkefølge?',opts:['Venstre→rot→høyre','Rot→venstre→høyre','Venstre→høyre→rot','Høyre→rot→venstre'],ans:2,exp:'<b>Venstre→høyre→rot</b> — "post" = rot ETTER barn. Brukes til å slette et tre.',pen:'DAT102 - Eksamensanalyse',hints:['"post" = rot ETTER','Barn først, deretter rot','Venstre→høyre→rot']},
{id:184,type:'flervalg',topic:'traer',diff:'medium',q:'BST worst-case høyde med n noder?',opts:['O(log n)','O(n)','O(n log n)','O(√n)'],ans:1,exp:'<b>O(n)</b> — sortert innsetting gir "listet" BST (skjevt tre). Alle n noder langs én side.',pen:'DAT102 - Eksamensanalyse',hints:['Hva skjer om vi setter inn 1,2,3,...,n?','Alle noder på høyre side','= lenket liste = O(n)']},
{id:185,type:'flervalg',topic:'traer',diff:'medium',q:'Hva er forskjellen mellom AVL-tre og Rød-Svart tre?',opts:['AVL: ingen rotasjoner','AVL er strammere balansert, RS er raskere å sette inn/slette','RS er alltid lavere','De er identiske'],ans:1,exp:'<b>AVL strammere balansert</b> → lavere høyde → raskere søk. RS: færre rotasjoner → raskere innsetting/sletting. Java TreeMap bruker rød-svart.',pen:'DAT102 - Eksamensanalyse',hints:['AVL: |h(h)-h(v)|≤1 (strengt)','RS: litt mer fleksibel balanse','RS: færre rotasjoner = raskere insert']},
{id:186,type:'flervalg',topic:'traer',diff:'easy',q:'Hva er "heapify" (siv ned)?',opts:['Sett inn nytt element','Flytt element nedover til riktig plass','Bygg heap fra scratch','Fjerne hele heapen'],ans:1,exp:'<b>Flytt nedover til riktig plass</b> — sammenlign med største/minste barn, bytt om nødvendig. Repetér til heap-egenskap er gjenopprettet.',pen:'DAT102 - Eksamensanalyse',hints:['Siv = flytt nedover','Sammenlign med barn','Bytt med passende barn']},
{id:187,type:'kode',topic:'traer',diff:'hard',q:'Binærsøk etter 8 i [2,4,6,8,10,12,14]: antall compareTo-kall?',opts:['1','2','3','4'],ans:0,exp:'<b>1</b> — midt=(0+6)/2=3. tab[3]=8. Funnet på første sammenligning.',pen:'DAT102 - Rekursjon / Eksamensanalyse',hints:['midt=(0+6)/2=3','tab[3]=?','Funnet på første kall!']},
{id:188,type:'flervalg',topic:'traer',diff:'hard',q:'Huffman-tre brukes til?',opts:['Sortering','Datakomprimering','Kryptering','Søking'],ans:1,exp:'<b>Datakomprimering</b> — hyppige tegn får korte koder, sjeldne får lange. Bygger optimalt prefiks-tre.',pen:'DAT102 - Eksamensanalyse',hints:['Kortere koder for hyppige tegn','Optimalt prefiks-tre','Komprimering']},
{id:189,type:'flervalg',topic:'traer',diff:'medium',q:'B-trær brukes mest i?',opts:['RAM-baserte algoritmer','Databaser og filsystemer','Nettverksprotokoller','Grafalgoritmer'],ans:1,exp:'<b>Databaser og filsystemer</b> — høy forgreningsgrad minimerer antall disklesinger. Holder dataene i færre blokker.',pen:'DAT102 - Eksamensanalyse',hints:['Disk-optimalisert','Mange barn per node','Disklesinger minimeres']},
{id:190,type:'kode',topic:'traer',diff:'hard',q:'Hva returnerer fibonacci(5)?',code:'int fibonacci(int n) {\n    if (n <= 1) return n;\n    return fibonacci(n-1) + fibonacci(n-2);\n}',opts:['3','5','8','13'],ans:1,exp:'<b>5</b> — fib(5)=fib(4)+fib(3)=3+2=5. Sekvens: 0,1,1,2,3,5.',pen:'DAT102 - Rekursjon',hints:['fib(0)=0, fib(1)=1','fib(5)=fib(4)+fib(3)','0,1,1,2,3,5']},
{id:191,type:'flervalg',topic:'traer',diff:'medium',q:'Innsetting i haug: rekkefølge av operasjoner?',opts:['Siv ned, deretter legg bakerst','Legg bakerst, deretter boble opp','Legg fremst, deretter siv ned','Boble opp, deretter legg bakerst'],ans:1,exp:'<b>Legg bakerst → boble opp</b> — opprettholder komplett binærtre-struktur, deretter gjenoppretter heap-egenskapen.',pen:'DAT102 - Eksamensanalyse (Heap)',hints:['Legg bakerst for komplett binærtre','Heap-egenskap kan brytes','Boble opp til riktig plass']},

{id:49,type:'kode',topic:'stabel-ko',diff:'easy',q:'Hva skrives ut?',code:'Stack<Integer> s = new Stack<>();\ns.push(1); s.push(2); s.push(3);\ns.pop();\nSystem.out.println(s.peek());',opts:['1','2','3','Error'],ans:1,exp:'<b>2</b> — LIFO. pop() fjerner 3. peek() leser 2.',pen:'DAT102 - Stabel og kø',hints:['LIFO: sist inn, først ut','pop() fjerner fra topp','Ny topp = 2']},
{id:50,type:'kode',topic:'stabel-ko',diff:'medium',q:'Stabelen til slutt?',code:'Stack<Integer> s = new Stack<>();\ns.push(1); s.push(2); s.push(3);\ns.push(s.pop() + s.pop());',opts:['[1,2,3,5]','[1,5]','[5]','[1,2,5]'],ans:1,exp:'<b>[1,5]</b> — pop()=3, pop()=2. 3+2=5. Bunn→topp: [1,5].',pen:'DAT102 - Stabel og kø',hints:['Topp: 3 og 2','3+2=5 pushes','1 i bunn']},
{id:51,type:'kode',topic:'stabel-ko',diff:'easy',q:'Hva er x?',code:'Queue<Integer> q = new LinkedList<>();\nq.add(10); q.add(20);\nq.poll();\nint x = q.peek();',opts:['10','20','null','30'],ans:1,exp:'<b>20</b> — FIFO. poll()=10. peek()=20.',pen:'DAT102 - Stabel og kø',hints:['FIFO: først inn, først ut','poll() fjerner 10','Forrest er nå 20']},
{id:52,type:'feil',topic:'stabel-ko',diff:'medium',q:'Hva er feilen?',code:'public void printAll(Stack<Integer> s) {\n    while (!s.isEmpty()) {\n        System.out.println(s.pop());\n    }\n}',opts:['Feil returtype','Stabelen tømmes utilsiktet','Feil betingelse','Ingen feil'],ans:1,exp:'<b>Stabelen ødelegges!</b> pop() fjerner permanent. Kalleren finner tom stabel.',pen:'DAT102 - Stabel og kø',hints:['Hva skjer etterpå?','pop() fjerner permanent','Stabelen er tom etter kallet']},
{id:53,type:'flervalg',topic:'stabel-ko',diff:'easy',q:'pop() på tom Stack kaster?',opts:['null','-1','EmptyStackException','Ingenting'],ans:2,exp:'<b>EmptyStackException</b> (unchecked). Sjekk isEmpty() FØR pop().',pen:'DAT102 - Stabel og kø',hints:['Kaster exception','Unchecked','isEmpty() først']},
{id:54,type:'kode',topic:'stabel-ko',diff:'medium',q:'Hva skrives ut (PriorityQueue er min-heap)?',code:'PriorityQueue<Integer> pq = new PriorityQueue<>();\npq.add(30); pq.add(10); pq.add(20);\nSystem.out.println(pq.poll());',opts:['30','10','20','60'],ans:1,exp:'<b>10</b> — Java PriorityQueue er min-heap. poll() returnerer minste.',pen:'DAT102 - Stabel og kø',hints:['Java PQ = min-heap','poll() = minste','10']},
{id:55,type:'kode',topic:'stabel-ko',diff:'medium',q:'Hva skjer etter q.add(q.remove()) på kø [1,2,3]?',opts:['Tømt','Uendret','[2,3,1]','Reversert'],ans:2,exp:'<b>[2,3,1]</b> — remove() tar ut 1, add(1) legger bakerst. "Rotér kø".',pen:'DAT102 - Stabel og kø',hints:['remove()=poll()=fjern fremst','add() bakerst','1 flyttes fra front til bak']},
{id:56,type:'flervalg',topic:'stabel-ko',diff:'medium',q:'Fordelen med sirkulær tabell-kø vs. vanlig tabell?',opts:['Mindre minne','O(1) for enqueue og dequeue','Ubegrenset kapasitet','Sorterer automatisk'],ans:1,exp:'<b>O(1) for begge</b> — vanlig tabell: dequeue krever O(n) flytt. Sirkulær: kun indeks-oppdatering.',pen:'DAT102 - Stabel og kø',hints:['Vanlig: alle elementer flyttes ved dequeue','Sirkulær: bare pekere flyttes','O(1) vs O(n)']},

{id:192,type:'kode',topic:'stabel-ko',diff:'medium',q:'Parentessjekker: hva skrives ut for "{ [ ) }"?',code:'// Sjekker om parentessekvens er gyldig\n// push ved åpne, pop og match ved lukke\nsjekk("{ [ ) }");',opts:['true','false','StackOverflow','null'],ans:1,exp:'<b>false</b> — push {, push [. Møter ): pop() gir [, forsøker å pare med ) — MISMATCH. Returnerer false.',pen:'DAT102 - Stabel og kø',hints:['Push ved åpne','Pop ved lukke','[ pares ikke med )']},
{id:193,type:'flervalg',topic:'stabel-ko',diff:'easy',q:'Hva er LIFO?',opts:['Lengste Inn, Første Ut','Last-In-First-Out (stabel)','Lineær Iterasjon Fremover Omvendt','Laveste Indeks Flyttes Opp'],ans:1,exp:'<b>Last-In-First-Out</b> — siste element inn er første ut. Som tallerkenstabler.',pen:'DAT102 - Stabel og kø',hints:['LIFO = stabel','Siste inn, første ut','Tallerkenstabler']},
{id:194,type:'flervalg',topic:'stabel-ko',diff:'easy',q:'Hva er FIFO?',opts:['Første-Inn-Siste-Ut','First-In-First-Out (kø)','Fast Iterasjon For Objekter','Funksjon Indeksert For Output'],ans:1,exp:'<b>First-In-First-Out</b> — første inn er første ut. Som butikkø.',pen:'DAT102 - Stabel og kø',hints:['FIFO = kø','Første inn, første ut','Butikkø']},
{id:195,type:'kode',topic:'stabel-ko',diff:'medium',q:'Hva er verdien til x etter poll() på PriorityQueue med [30,10,20]?',code:'PriorityQueue<Integer> pq = new PriorityQueue<>();\npq.add(30); pq.add(10); pq.add(20);\nint x = pq.poll();\n// Hva er x?',opts:['30','10','20','Kaster exception'],ans:1,exp:'<b>10</b> — Java PriorityQueue er min-heap. poll() fjerner og returnerer det minste elementet.',pen:'DAT102 - Stabel og kø',hints:['Min-heap som standard','poll() = fjern minste','Minste = 10']},
{id:196,type:'flervalg',topic:'stabel-ko',diff:'medium',q:'Hva er en Deque?',opts:['En dobbel stabel','Double-Ended Queue: kan legge til/fjerne fra begge ender','En sortert kø','En prioritetskø'],ans:1,exp:'<b>Double-Ended Queue</b> — operasjoner i begge ender. addFirst/addLast, removeFirst/removeLast. Kan brukes som både stabel og kø.',pen:'DAT102 - Stabel og kø',hints:['Double-Ended Queue','Begge ender','Kan brukes som stabel OG kø']},

{id:198,type:'flervalg',topic:'stabel-ko',diff:'medium',q:'Call stack i Java bruker hvilken datastruktur?',opts:['Kø','Stabel','Heap','BST'],ans:1,exp:'<b>Stabel (LIFO)</b> — hvert metodekall legger et frame på stacken. Retur fjerner det. StackOverflowError når for mange frames.',pen:'DAT102 - Rekursjon / Stabel og kø',hints:['Kall legges oppå','Retur fjerner øverste','LIFO = stabel']},
{id:199,type:'flervalg',topic:'stabel-ko',diff:'hard',q:'Hva er optimal implementasjon for en stabel?',opts:['Sortert LinkedList','TabellStabel (array) eller LenketStabel — begge O(1) for push/pop','Heap','BST'],ans:1,exp:'<b>Begge er O(1)</b> for push og pop. TabellStabel: bedre cache-lokalitet. LenketStabel: dynamisk størrelse. Avhenger av bruksscenario.',pen:'DAT102 - Stabel og kø',hints:['push og pop skal være raske','Begge: O(1)','Valg avhenger av scenario']},

{id:57,type:'kode',topic:'rekursjon',diff:'easy',q:'Hva returnerer mystikk(5)?',code:'public int mystikk(int n) {\n    if (n == 0) return 0;\n    return n + mystikk(n - 1);\n}',opts:['5','10','15','0'],ans:2,exp:'<b>15</b> — 5+4+3+2+1+0=15. Beregner n(n+1)/2.',pen:'DAT102 - Rekursjon',hints:['5+mystikk(4)','Ekspander til 0','Sum: 5+4+3+2+1+0']},
{id:58,type:'feil',topic:'rekursjon',diff:'medium',q:'Hva skjer ved f(2)?',code:'public void f(int n) {\n    if (n > 0) {\n        f(n);   // feilen er her\n        System.out.print(n);\n    }\n}',opts:['Skriver "2 1"','Skriver "2"','StackOverflowError','Ingenting'],ans:2,exp:'<b>StackOverflowError!</b> f(n) uten endring → uendelig rekursjon. Skal være f(n-1).',pen:'DAT102 - Rekursjon',hints:['f(n) ikke f(n-1)','n endres ikke','Uendelig rekursjon → overflow']},
{id:59,type:'kode',topic:'rekursjon',diff:'medium',q:'Hva returnerer sjekk("radar")?',code:'boolean sjekk(String s) {\n    if (s.length() <= 1) return true;\n    if (s.charAt(0) != s.charAt(s.length()-1))\n        return false;\n    return sjekk(s.substring(1, s.length()-1));\n}',opts:['false','true','null','StackOverflow'],ans:1,exp:'<b>true</b> — palindromsjekk. r==r→sjekk("ada"). a==a→sjekk("d")→true.',pen:'DAT102 - Rekursjon',hints:['Første og siste tegn','Kutter begge, sjekker midten','Er "radar" et palindrom?']},
{id:60,type:'kode',topic:'rekursjon',diff:'medium',q:'Hva returnerer metode(2,3)?',code:'int metode(int a, int b) {\n    if (b == 0) return 0;\n    return a + metode(a, b - 1);\n}',opts:['5','8','6','2'],ans:2,exp:'<b>6</b> — multiplikasjon via addisjon. 2+2+2+0=6.',pen:'DAT102 - Rekursjon',hints:['b teller ned','a legges til per kall','a × b = 2 × 3']},
{id:61,type:'fullfør',topic:'rekursjon',diff:'medium',q:'Fullfør: returner antall sifre i n',code:'int antallSifre(int n) {\n    if (n < 10) return 1;\n    return ___________;\n}',opts:['1 + antallSifre(n - 1)','1 + antallSifre(n / 10)','antallSifre(n / 10)','n % 10 + antallSifre(n / 10)'],ans:1,exp:'<b>1 + antallSifre(n/10)</b> — n/10 kutter siste siffer. 123: 1+1+1=3.',pen:'DAT102 - Rekursjon',hints:['n/10 kutter siste siffer','+1 per siffer','123: 3 sifre']},
{id:62,type:'kode',topic:'rekursjon',diff:'hard',q:'Hva returnerer g(3)?',code:'int g(int n) {\n    if (n <= 0) return 1;\n    return g(n-1) + g(n-1);\n}',opts:['3','4','8','6'],ans:2,exp:'<b>8</b> — g(n)=2×g(n-1). g(0)=1, g(1)=2, g(2)=4, g(3)=8 = 2ⁿ.',pen:'DAT102 - Rekursjon',hints:['g(0)=1','g(1)=2, g(2)=4','g(3)=8 = 2³']},
{id:63,type:'kode',topic:'rekursjon',diff:'medium',q:'Hva returnerer mystikk(5)?',code:'int mystikk(int n) {\n    if (n <= 1) return 1;\n    return n * mystikk(n - 2);\n}',opts:['120','15','8','0'],ans:1,exp:'<b>15</b> — n-2: 5→3→1. 5×3×1=15.',pen:'DAT102 - Rekursjon',hints:['n-2 ikke n-1','5→3→1','5×3×1=15']},
{id:64,type:'kode',topic:'rekursjon',diff:'medium',q:'Hva returnerer regn({1,2,3,4}, 4)?',code:'int regn(int[] a, int n) {\n    if (n <= 0) return 0;\n    return a[n-1] + regn(a, n-1);\n}',opts:['4','10','0','24'],ans:1,exp:'<b>10</b> — summer alle: 4+3+2+1=10.',pen:'DAT102 - Rekursjon',hints:['a[n-1] + rest','n teller ned','1+2+3+4=10']},
{id:65,type:'kode',topic:'rekursjon',diff:'medium',q:'Hva returnerer metode("abc")?',code:'String metode(String s) {\n    if (s.isEmpty()) return s;\n    return metode(s.substring(1)) + s.charAt(0);\n}',opts:['abc','cba','aaa','tom'],ans:1,exp:'<b>"cba"</b> — reverserer rekursivt. charAt(0) legges bakerst.',pen:'DAT102 - Rekursjon',hints:['charAt(0) bakerst','Rekursjon på resten','abc → cba']},
{id:66,type:'flervalg',topic:'rekursjon',diff:'easy',q:'Rekursjon krever alltid?',opts:['Minst to basistilfeller','Et basistilfelle som stopper rekursjonen','En løkke','Static-metode'],ans:1,exp:'<b>Et basistilfelle</b> — uten base case: uendelig rekursjon → StackOverflowError. Rekursivt kall SKAL nærme seg base case.',pen:'DAT102 - Rekursjon',hints:['Hva stopper rekursjonen?','Uten stopp: uendelig','Base case!']},

{id:200,type:'feil',topic:'rekursjon',diff:'medium',q:'Hva er feilen?',code:'static int sum(int n) {\n    return n + sum(n - 1);\n}',opts:['Feil returtype','Mangler base case → StackOverflow','n-1 er feil','Ingen feil'],ans:1,exp:'<b>Mangler base case!</b> sum(0) kaller sum(-1) kaller sum(-2) osv. Fix: if (n <= 0) return 0;',pen:'DAT102 - Rekursjon',hints:['Hva stopper rekursjonen?','Stopper den?','StackOverflowError!']},
{id:201,type:'kode',topic:'rekursjon',diff:'hard',q:'Hva er tidskompleksiteten til naiv Fibonacci?',code:'int fib(int n) {\n    if (n <= 1) return n;\n    return fib(n-1) + fib(n-2);\n}',opts:['O(n)','O(n log n)','O(2ⁿ)','O(n²)'],ans:2,exp:'<b>O(2ⁿ)</b> — eksponentiell! Hvert kall gjør to rekursive kall. Memoization løser dette til O(n).',pen:'DAT102 - Rekursjon',hints:['Hvert kall gjør 2 kall','Binærtre rekursjon','2ⁿ noder']},
{id:202,type:'fullfør',topic:'rekursjon',diff:'hard',q:'Fullfør rekursivt binærsøk:',code:'int binaersok(int[] a, int el, int lav, int hoy) {\n    if (lav > hoy) return -1;\n    int midt = (lav + hoy) / 2;\n    if (a[midt] == el) return midt;\n    if (el < a[midt])\n        return ____;\n    return binaersok(a, el, midt + 1, hoy);\n}',opts:['binaersok(a, el, lav, midt)','binaersok(a, el, lav, midt - 1)','binaersok(a, el, lav - 1, midt)','binaersok(a, el, midt, hoy)'],ans:1,exp:'<b>binaersok(a, el, lav, midt-1)</b> — el < a[midt]: søk venstre. midt allerede sjekket.',pen:'DAT102 - Rekursjon / Eksamensanalyse',hints:['el < a[midt] → søk venstre','Venstre: lav til midt-1','midt er sjekket']},
{id:203,type:'kode',topic:'rekursjon',diff:'medium',q:'Hva returnerer f(100) (McCarthy 91)?',code:'int f(int n) {\n    if (n > 100) return n - 10;\n    return f(f(n + 11));\n}',opts:['90','91','100','111'],ans:1,exp:'<b>91</b> — McCarthy 91-funksjonen returnerer alltid 91 for n ≤ 100.',pen:'DAT102 - Rekursjon',hints:['f(111)=101','f(101)=91','Alltid 91 for n≤100']},
{id:204,type:'flervalg',topic:'rekursjon',diff:'medium',q:'Antall basistilfeller i rekursivt binærsøk?',opts:['1','2','3','0'],ans:1,exp:'<b>2 basistilfeller</b> — 1) Funnet elementet (a[midt]==el). 2) Tom søkerom (lav>hoy → ikke funnet).',pen:'DAT102 Eksamen Juni 2022',hints:['Når stopper binærsøk?','1: funnet','2: ikke funnet (tom søkerom)']},
{id:205,type:'kode',topic:'rekursjon',diff:'medium',q:'Hva gjør denne metoden?',code:'public int f(int n) {\n    if (n < 10) return n;\n    return n % 10 + f(n / 10);\n}',opts:['Snur sifrene','Teller sifre','Beregner tverrsummen','Beregner n!'],ans:2,exp:'<b>Tverrsummen</b> — n%10 = siste siffer, f(n/10) = tverrsummen av resten. f(123)=3+f(12)=3+2+f(1)=3+2+1=6.',pen:'DAT102 - Rekursjon',hints:['n%10 = siste siffer','n/10 kutter siste','3+2+1=6 for n=123']},
{id:206,type:'flervalg',topic:'rekursjon',diff:'medium',q:'Del og hersk: hva er prinsippet?',opts:['Del problemet, løs brute force','Del i mindre deler, løs rekursivt, kombiner','Alltid to delproblemer','Kun for sortering'],ans:1,exp:'<b>Del i deler, løs rekursivt, kombiner.</b> Eksempler: Merge Sort, Quick Sort, binærsøk. O(n log n) typisk.',pen:'DAT102 - Rekursjon / Avansert sortering',hints:['Tre faser','Del, løs, kombiner','Merge Sort er typisk eksempel']},
{id:207,type:'kode',topic:'rekursjon',diff:'hard',q:'Tidskompleksitet til rekursiv Fibonacci (naiv)?',code:'int fib(int n) {\n    if (n <= 1) return n;\n    return fib(n-1) + fib(n-2);\n}',opts:['O(n)','O(n²)','O(2ⁿ)','O(log n)'],ans:2,exp:'<b>O(2ⁿ)</b> — hvert kall gjør to kall. Rekursjonstre har eksponentielt mange noder.',pen:'DAT102 - Rekursjon',hints:['Hvert kall: to kall','Binærtre-rekursjon','2ⁿ noder']},

{id:75,type:'kode',topic:'lenket-liste',diff:'medium',q:'Hva gjør koden med [1,2,3,4,5]?',code:'Node curr = hode;\nwhile (curr != null && curr.neste != null) {\n    curr.neste = curr.neste.neste;\n    curr = curr.neste;\n}',opts:['Reverserer','Sletter annenhver','Fjerner alle','Dobler'],ans:1,exp:'<b>Sletter annenhver</b> — hopper over neste. Resultat: [1,3,5].',pen:'DAT102 - LenketMengde',hints:['curr.neste = curr.neste.neste','2 og 4 hoppes over','1→3→5']},
{id:76,type:'kode',topic:'lenket-liste',diff:'easy',q:'Hva er curr etter løkken (5 noder)?',code:'Node curr = hode;\nwhile (curr.neste != null) {\n    curr = curr.neste;\n}',opts:['Første','Midterste','Siste','null'],ans:2,exp:'<b>Siste node</b> — stopper når curr.neste==null.',pen:'DAT102 - LenketMengde',hints:['Stopper: curr.neste==null','Siste: .neste=null','curr = siste']},
{id:77,type:'fullfør',topic:'lenket-liste',diff:'medium',q:'Fullfør inneholder():',code:'public boolean inneholder(T element) {\n    Node<T> gjeldende = forste;\n    while (gjeldende != null) {\n        if (element.equals(gjeldende.data)) {\n            return ____;\n        }\n        gjeldende = gjeldende.neste;\n    }\n    return ____;\n}',opts:['true ... false','false ... true','true ... true','null ... false'],ans:0,exp:'<b>true</b> ved funn, <b>false</b> etter løkken. BC:O(1), WC:O(n).',pen:'DAT102 - LenketMengde',hints:['Funn → sant','Ikke funnet → usant','true/false']},
{id:78,type:'feil',topic:'lenket-liste',diff:'hard',q:'Hva er feilen?',code:'// Fjern noden rett etter p:\np.neste = p.neste.neste;',opts:['p.neste endres ikke','NullPointerException hvis p er siste','Listen reverseres','p settes null'],ans:1,exp:'<b>NullPointerException!</b> Siste node: p.neste==null. Fix: if (p.neste != null) ...',pen:'DAT102 - LenketMengde',hints:['p.neste for siste = null','null.neste = krasj!','Sjekk null']},
{id:79,type:'kode',topic:'lenket-liste',diff:'medium',q:'Hva implementerer dette?',code:'void add(T el) {\n    Node n = new Node(el);\n    n.next = top;\n    top = n;\n}',opts:['Kø','Stabel','BST','HashMap'],ans:1,exp:'<b>Stabel (LIFO)</b> — ny node settes fremst (top). Sist inn = først ut.',pen:'DAT102 - Stabel og kø / Lenkede lister',hints:['n.next=top (gammel topp)','top=ny node','Fremst = LIFO']},
{id:80,type:'flervalg',topic:'lenket-liste',diff:'easy',q:'Hva kopierer Node gjeldende = forste?',opts:['Hele noden','Referansen til forste','Deep copy av kjeden','Ingenting'],ans:1,exp:'<b>Referansen</b> — gjeldende og forste peker på SAMME node. Bare adressen kopieres.',pen:'DAT102 - LenketMengde',hints:['Java: variabel = adresse','= kopierer adresse, ikke objektet','Samme node!']},

{id:215,type:'flervalg',topic:'lenket-liste',diff:'medium',q:'Tidskompleksitet for get(i) i LinkedList vs. ArrayList?',opts:['Begge O(1)','LinkedList O(n), ArrayList O(1)','LinkedList O(1), ArrayList O(n)','Begge O(n)'],ans:1,exp:'<b>LinkedList O(n), ArrayList O(1)</b> — ArrayList: direkte indeks. LinkedList: traverse fra start til i.',pen:'DAT102 - LenketMengde',hints:['ArrayList: array bak','Direkte indeks = O(1)','LinkedList: traverse fra start']},
{id:216,type:'feil',topic:'lenket-liste',diff:'medium',q:'Hva er feilen i minus()?',code:'public MengdeADT<T> minus(MengdeADT<T> annen) {\n    MengdeADT<T> res = new LenketMengde<>();\n    Node<T> g = forste;\n    while (g != null) {\n        if (!annen.erDelmengdeAv(g.data)) {  // <-- feil?\n            res.leggTil(g.data);\n        }\n        g = g.neste;\n    }\n    return res;\n}',opts:['leggTil feil','erDelmengdeAv() brukes feil — bør være inneholder()','g.data er null','res initialiseres feil'],ans:1,exp:'<b>Skal være inneholder()!</b> erDelmengdeAv() sjekker om hele mengden er delmengde — gir ikke mening for ett element.',pen:'DAT102 - LenketMengde',hints:['erDelmengdeAv() tar en mengde, ikke element','Vi sjekker ett element','Bruk inneholder()']},
{id:217,type:'flervalg',topic:'lenket-liste',diff:'easy',q:'Hva er BC for leggTil() i LenketMengde?',opts:['O(n)','O(1)','O(n²)','O(log n)'],ans:0,exp:'<b>O(n)</b> — leggTil() kaller inneholder() som er O(n) WC (duplikatsikring). Alltid minimum O(n).',pen:'DAT102 - Kompleksitetsanalyse',hints:['leggTil() kaller inneholder()','inneholder() = O(n) WC','Alltid O(n)']},

{id:219,type:'feil',topic:'lenket-liste',diff:'hard',q:'Hva er feilen i leggTilFremst()?',code:'public void leggTilFremst(T element) {\n    Node<T> ny = new Node<>(element);\n    forste = ny;\n    antall++;\n    // La neste peke på gammel forste?\n}',opts:['antall++ feil','ny.neste = null: forste glemmes (data tap)','element validering mangler','forste settes feil'],ans:1,exp:'<b>ny.neste settes aldri!</b> ny.neste forblir null → resten av listen er utilgjengelig. Fix: ny.neste = forste; forste = ny;',pen:'DAT102 - LenketMengde',hints:['ny.neste = ?','Uten ny.neste = forste: resten mistes','Koble ny til gammel forste FØRST']},
