{id:237,type:'flervalg',topic:'generics',diff:'medium',q:'Hva er MengdeADT-kontrakten?',opts:['Elementer er sorterte','Ingen duplikater, rekkefølge ikke garantert','Alltid lenket liste','Maks 100 elementer'],ans:1,exp:'<b>Ingen duplikater, rekkefølge ikke garantert.</b> MengdeADT = matematisk mengde. leggTil() sjekker inneholder() først.',pen:'DAT102 - Generics og type erasure',hints:['Matematisk mengde','Ingen duplikater','Rekkefølge = ubestemt']},
{id:238,type:'kode',topic:'generics',diff:'medium',q:'Hva returnerer s.size() her?',code:'Set<String> s = new TreeSet<>();\ns.add("B"); s.add("A"); s.add("C"); s.add("A");',opts:['4','3','2','1'],ans:1,exp:'<b>3</b> — TreeSet: ingen duplikater. {A, B, C} = 3. TreeSet er sortert.',pen:'DAT102 - Generics',hints:['Ingen duplikater','A legges til to ganger','{A,B,C}=3']},
{id:239,type:'flervalg',topic:'generics',diff:'medium',q:'Hva er LinkedHashMap?',opts:['Trådsikker HashMap','HashMap + bevarer innsettingsrekkefølge','Sortert HashMap','HashMap for primitive'],ans:1,exp:'<b>HashMap + innsettingsrekkefølge</b> via ekstra lenket liste. Litt tregere enn HashMap.',pen:'DAT102 - Hashing / Generics',hints:['HashMap-variant','Bevarer rekkefølge','Ekstra lenket liste']},
{id:240,type:'kode',topic:'generics',diff:'hard',q:'Hva er feilen?',code:'class Bag {\n    Object[] data = new Object[100];\n    \n    void add(Object e) { /*...*/ }\n    \n    Object get(int i) { return data[i]; }\n}\n// Bruk:\nBag b = new Bag();\nb.add("hei");\nString s = b.get(0); // <-- feil her',opts:['add("hei") feiler','String s = b.get(0): trenger cast','Bag trenger generics','Object[] er ugyldig'],ans:1,exp:'<b>Mangler cast!</b> get() returnerer Object. Trenger: String s = (String) b.get(0);. Med generics Bag<String> unngås dette.',pen:'DAT102 - Generics og type erasure',hints:['get() returnerer Object','Object kan ikke tilordnes String','Cast nødvendig uten generics']},
{id:241,type:'flervalg',topic:'generics',diff:'medium',q:'Hva er ConcurrentHashMap?',opts:['Sortert HashMap','Trådsikker HashMap','HashMap med cache','HashMap med primtall'],ans:1,exp:'<b>Trådsikker HashMap</b> — for flertrådet kode. Mer effektiv enn Hashtable (segmentert låsing).',pen:'DAT102 - Hashing / Generics',hints:['Concurrent = flertrådet','Trådsikker','Mer effektiv enn Hashtable']},
{id:242,type:'kode',topic:'generics',diff:'medium',q:'Hva er størrelsen på listen etter koden?',code:'List<String> l = new LinkedList<>();\nl.add("A"); l.add("B"); l.add(1, "C");\nSystem.out.println(l.size());',opts:['2','3','4','1'],ans:1,exp:'<b>3</b> — add("A"), add("B"), add(1,"C"): sett inn på indeks 1. l=[A,C,B]. size()=3.',pen:'DAT102 - Generics',hints:['add(1,"C") = sett inn på plass 1','[A,C,B]','size()=3']},
{id:243,type:'kode',topic:'generics',diff:'medium',q:'Hva er l etter koden?',code:'List<Integer> l = new LinkedList<>(Arrays.asList(1,2,3));\nl.add(1, 99);',opts:['[1,99,2,3]','[99,1,2,3]','[1,2,99,3]','[1,2,3,99]'],ans:0,exp:'<b>[1,99,2,3]</b> — add(1,99): sett inn 99 på indeks 1. 2 og 3 skifter høyre.',pen:'DAT102 - Generics',hints:['add(1,99): indeks 1','2 og 3 skifter høyre','[1,99,2,3]']},

// ===================== SQL (20+) =====================
{id:244,type:'flervalg',topic:'sql',diff:'easy',q:'Hva beskriver SQL?',opts:['Hvordan data hentes','Hva du vil ha, ikke hvordan','Maskinkode for databaser','Kun tabelloppretting'],ans:1,exp:'<b>Hva, ikke hvordan</b> — SQL er deklarativt: du beskriver ønsket resultat. Databasen bestemmer utføring.',pen:'DAT107 - SQL grunnleggende',hints:['Deklarativt språk','Beskriver ønsket resultat','Ikke "algoritme"']},
{id:245,type:'kode',topic:'sql',diff:'easy',q:'Hva returnerer denne spørringen?',code:'SELECT * FROM ansatt\nORDER BY lønn DESC;',opts:['Alle ansatte, høyest lønn først','Alle ansatte, lavest lønn først','Bare de med høyest lønn','Ingen rader'],ans:0,exp:'<b>Alle ansatte, høyest lønn først</b> — DESC = synkende. ASC = stigende (standard).',pen:'DAT107 - SQL grunnleggende',hints:['* = alle kolonner','ORDER BY = sortert','DESC = synkende']},
{id:246,type:'kode',topic:'sql',diff:'medium',q:'Hva gjør HAVING?',code:'SELECT stilling, AVG(lønn)\nFROM ansatt\nGROUP BY stilling\nHAVING AVG(lønn) > 480000;',opts:['Filtrerer individuelle rader','Filtrerer grupper etter aggregering','Sorterer resultatet','Kobler tabeller'],ans:1,exp:'<b>Filtrerer grupper</b> — HAVING er WHERE for grupper. Brukes etter GROUP BY.',pen:'DAT107 - SQL grunnleggende',hints:['WHERE = individer','HAVING = grupper','Etter GROUP BY']},
{id:247,type:'flervalg',topic:'sql',diff:'medium',q:'Hva er INNER JOIN?',opts:['Alle rader fra venstre tabell','Bare rader med match i begge','Alle rader fra begge','Rader uten match'],ans:1,exp:'<b>Bare rader med match i begge tabeller</b> — INNER JOIN er standard JOIN. Ekskluderer umatchede.',pen:'DAT107 - Joins og avansert SQL',hints:['Match i begge?','Ekskluderer umatchede','Standard JOIN']},
{id:248,type:'kode',topic:'sql',diff:'medium',q:'Hva er forskjellen?',code:'-- A:\nSELECT * FROM ansatt\nINNER JOIN avdeling ON ansatt.avd = avdeling.kode;\n\n-- B:\nSELECT * FROM ansatt\nLEFT OUTER JOIN avdeling ON ansatt.avd = avdeling.kode;',opts:['Identiske','A: utelukker ansatte uten avdeling. B: inkluderer dem','B: raskere','A: inkluderer alle, B ikke'],ans:1,exp:'<b>INNER JOIN</b> utelukker ansatte uten avdeling (NULL i avd). <b>LEFT OUTER JOIN</b> inkluderer alle ansatte.',pen:'DAT107 - Joins og avansert SQL',hints:['INNER: match i begge','LEFT OUTER: alle fra venstre','Ingen avdeling → NULL i B']},
{id:249,type:'kode',topic:'sql',diff:'easy',q:'COUNT(*) vs COUNT(lønn) — hva er forskjellen?',code:'SELECT COUNT(*), COUNT(lønn) FROM ansatt;',opts:['Identiske','COUNT(*) teller alle rader, COUNT(lønn) hopper over NULL','COUNT(lønn) teller bare positive','COUNT(*) er raskere'],ans:1,exp:'<b>COUNT(*) = alle rader. COUNT(lønn) = rader der lønn IKKE er NULL.</b> Brukes for å finne ansatte uten lønn.',pen:'DAT107 - SQL grunnleggende',hints:['COUNT(*): alle rader','COUNT(kol): hopper over NULL','Differansen = antall med NULL']},
{id:250,type:'kode',topic:'sql',diff:'medium',q:'Hva returnerer spørringen?',code:'SELECT stilling, COUNT(*) AS antall\nFROM ansatt\nGROUP BY stilling;',opts:['Alle stillinger og alle ansatte','Antall ansatte per stilling','Gjennomsnitt per stilling','Kun unikke stillinger'],ans:1,exp:'<b>Antall ansatte per stilling</b> — GROUP BY grupperer, COUNT(*) teller per gruppe.',pen:'DAT107 - SQL grunnleggende',hints:['GROUP BY: grupperer','COUNT(*): teller per gruppe','Per stilling']},
{id:251,type:'flervalg',topic:'sql',diff:'easy',q:'Hva er et VIEW i SQL?',opts:['En kopi av tabellen','En lagret spørring som oppfører seg som tabell','En indeks','En prosedyre'],ans:1,exp:'<b>Lagret spørring</b> — VIEW lagrer ikke data, bare spørringen. Data hentes fra underliggende tabeller ved bruk.',pen:'DAT107 - Joins og avansert SQL',hints:['Lagrer ikke data','Lagrer spørringen','Virtuell tabell']},
{id:252,type:'kode',topic:'sql',diff:'medium',q:'Hva gjør NOT EXISTS her?',code:'SELECT * FROM ansatt AS a\nWHERE NOT EXISTS (\n    SELECT * FROM prosjekt_deltakelse AS pd\n    WHERE pd.ans_nr = a.ans_nr\n);',opts:['Ansatte I prosjekt','Ansatte IKKE i prosjekt','Alle ansatte','Tomme prosjekter'],ans:1,exp:'<b>Ansatte IKKE i prosjekt</b> — NOT EXISTS er sant når delspørringen returnerer 0 rader.',pen:'DAT107 - Joins og avansert SQL',hints:['NOT EXISTS: sant = 0 rader','Delspørringen: finner deltakelse','Ingen deltakelse = inkluder']},
{id:253,type:'kode',topic:'sql',diff:'medium',q:'Hva gjør ON DELETE CASCADE?',code:'CREATE TABLE ordre (\n    ordrenr INT PRIMARY KEY,\n    kunde_nr INT REFERENCES kunde(knr)\n        ON DELETE CASCADE\n);',opts:['Sletter bare ordre','Sletter ordre automatisk når kunden slettes','Hindrer sletting av kunden','Oppdaterer referanser'],ans:1,exp:'<b>Sletter automatisk ordrer når kunden slettes</b> — cascade propagerer slettingen nedover.',pen:'DAT107 - Tabeller og nøkler',hints:['CASCADE = propagerer','Kunden slettes → ordrer slettes','Automatisk']},
{id:254,type:'flervalg',topic:'sql',diff:'easy',q:'Hva er DDL i SQL?',opts:['SELECT/INSERT/UPDATE','CREATE/ALTER/DROP — definerer struktur','Brukeradministrasjon','Transaksjoner'],ans:1,exp:'<b>DDL = Data Definition Language</b> — CREATE TABLE, ALTER TABLE, DROP TABLE. Definerer databasestruktur.',pen:'DAT107 - Datamodellering',hints:['DDL = definisjon','CREATE, ALTER, DROP','Struktur, ikke data']},
{id:255,type:'kode',topic:'sql',diff:'easy',q:'Hva er DML i SQL?',opts:['CREATE/ALTER/DROP','SELECT/INSERT/UPDATE/DELETE','Brukeradministrasjon','Indekser'],ans:1,exp:'<b>DML = Data Manipulation Language</b> — SELECT, INSERT, UPDATE, DELETE. Henter og endrer data.',pen:'DAT107 - Datamodellering',hints:['DML = manipulering','SELECT, INSERT, UPDATE, DELETE','Data, ikke struktur']},
{id:256,type:'flervalg',topic:'sql',diff:'medium',q:'Hva er LIKE % i SQL?',opts:['Eksakt match','Joker for 0 eller flere tegn','Joker for nøyaktig 1 tegn','Ulikhetsoperator'],ans:1,exp:'<b>Joker for 0+ tegn.</b> LIKE \'F%\' = begynner på F. LIKE \'%sen\' = slutter på sen. _ = nøyaktig 1 tegn.',pen:'DAT107 - SQL grunnleggende',hints:['% = 0 eller flere tegn','_ = nøyaktig 1 tegn','LIKE er operatoren']},
{id:257,type:'kode',topic:'sql',diff:'medium',q:'Eksamen Jan 2026: Ansatte som ikke sitter på kontor?',code:'-- Metode 1: NOT EXISTS\nSELECT * FROM Ansatt AS a\nWHERE NOT EXISTS (\n    SELECT * FROM Tilordning AS t\n    WHERE a.ansattnummer = t.ansattnummer\n);\n-- Hva returnerer dette?',opts:['Ansatte med kontor','Ansatte UTEN kontor','Alle kontorer','Tom tabell'],ans:1,exp:'<b>Ansatte uten kontor</b> — NOT EXISTS: sant om ingen tilordning finnes for ansattnummer.',pen:'DAT107 Eksamen Januar 2026',hints:['NOT EXISTS: ingen rad i delspørring','Ingen tilordning = ikke på kontor','Returnerer ansatte uten kontor']},
{id:258,type:'kode',topic:'sql',diff:'medium',q:'Hva gjør denne spørringen?',code:'SELECT avdeling, COUNT(*) AS antall\nFROM ansatt\nGROUP BY avdeling\nHAVING COUNT(*) > 10;',opts:['Avdelinger med ≤10 ansatte','Avdelinger med >10 ansatte','Alle avdelinger','Ansatte i ingen avdeling'],ans:1,exp:'<b>Avdelinger med mer enn 10 ansatte</b> — HAVING filtrerer grupper etter aggregering.',pen:'DAT107 - SQL grunnleggende',hints:['GROUP BY: per avdeling','COUNT(*): teller','HAVING: filter på grupper']},
{id:259,type:'flervalg',topic:'sql',diff:'medium',q:'Hva er kartesisk produkt i SQL?',opts:['En optimert JOIN','Alle kombinasjoner uten koblingsbetingelse','En rask INNER JOIN','En spesiell tabell'],ans:1,exp:'<b>Alle kombinasjoner</b> — 100 ordrer × 50 kunder = 5000 rader. Nesten alltid en feil.',pen:'DAT107 - Joins og avansert SQL',hints:['Uten koblingsbetingelse','Alle × alle kombinasjoner','Nesten alltid feil']},
{id:260,type:'kode',topic:'sql',diff:'medium',q:'Hva returnerer dette?',code:'SELECT * FROM kunde\nWHERE knr IN (\n    SELECT knr FROM ordre\n);',opts:['Kunder uten ordrer','Kunder med minst én ordre','Alle kunder','Alle ordrer'],ans:1,exp:'<b>Kunder med minst én ordre</b> — IN: knr finnes i ordretabellen.',pen:'DAT107 - Joins og avansert SQL',hints:['IN: er verdien i lista?','Lista fra undersp: kundenr med ordre','Kunder som har bestilt']},
{id:261,type:'flervalg',topic:'sql',diff:'easy',q:'Hva er NULL i SQL?',opts:['0','Tom streng','Ukjent/manglende verdi','false'],ans:2,exp:'<b>Ukjent/manglende verdi</b> — NULL != 0 != tom streng. Bruk IS NULL, ikke = NULL.',pen:'DAT107 - Joins og avansert SQL',hints:['NULL ≠ 0','NULL ≠ tom streng','IS NULL, ikke = NULL']},
{id:262,type:'kode',topic:'sql',diff:'medium',q:'Eksamen Jan 2026: Ansatte på kontor E408?',code:'SELECT navn\nFROM Ansatt INNER JOIN Tilordning\nON Ansatt.ansattnummer = Tilordning.ansattnummer\nWHERE kontornummer = \'E408\';',opts:['Alle ansatte','Alle kontorer','Navn på ansatte på E408','Kontorer uten ansatte'],ans:2,exp:'<b>Navn på ansatte som sitter på E408</b> — INNER JOIN kobler Ansatt og Tilordning, WHERE filtrerer på E408.',pen:'DAT107 Eksamen Januar 2026',hints:['INNER JOIN: kobler tabellene','WHERE: filter på kontor','navn er kolonnen']},
{id:263,type:'flervalg',topic:'sql',diff:'medium',q:'Hva er ON DELETE RESTRICT?',opts:['Slett alle refererende rader automatisk','Hindrer sletting om det finnes refererende rader','Setter FK til NULL','Ignorerer constraint'],ans:1,exp:'<b>Hindrer sletting</b> — om det finnes refererende rader, feiler DELETE.',pen:'DAT107 - Tabeller og nøkler',hints:['RESTRICT = begrens','Kan ikke slette om noen peker hit','Eksempel: slett student med eksamener']},

// ===================== JPA (15+) =====================
{id:264,type:'flervalg',topic:'jpa',diff:'easy',q:'Hva er JPA?',opts:['Java Performance API','Jakarta Persistence API — ORM mellom Java og database','JavaScript Processing API','Java Print API'],ans:1,exp:'<b>Jakarta Persistence API</b> — ORM (Object-Relational Mapping). Mapper Java-objekter til databasetabeller.',pen:'DAT107 - JPA oversikt',hints:['ORM = Object-Relational Mapping','Java objekter ↔ databasetabeller','Standard API']},
{id:265,type:'flervalg',topic:'jpa',diff:'easy',q:'Hva betyr @Entity?',opts:['Klassen er en service','Klassen = databasetabell, objekt = rad','Klassen er privat','Klassen er trådsikker'],ans:1,exp:'<b>Klassen = databasetabell. Hvert objekt = én rad.</b> Obligatorisk for JPA-klasser.',pen:'DAT107 - JPA oversikt',hints:['Tabell = klasse','Rad = objekt','@Entity = JPA-klasse']},
{id:266,type:'kode',topic:'jpa',diff:'easy',q:'Hva gjør em.persist()?',code:'tx.begin();\nem.persist(nyAnsatt);\ntx.commit();',opts:['UPDATE eksisterende rad','SELECT fra database','INSERT ny rad','DELETE rad'],ans:2,exp:'<b>INSERT</b> — persist() lagrer et nytt objekt i databasen (INSERT SQL).',pen:'DAT107 - JPA oversikt',hints:['persist = lagre ny','INSERT SQL genereres','Må være i transaksjon']},
{id:267,type:'flervalg',topic:'jpa',diff:'easy',q:'Hva gjør em.find()?',code:'Ansatt a = em.find(Ansatt.class, id);',opts:['Kjøre JPQL','SELECT via primærnøkkel (null hvis ikke funnet)','Slette objekt','UPDATE objekt'],ans:1,exp:'<b>SELECT via PK.</b> Returnerer null om ikke funnet. Raskest for PK-oppslag.',pen:'DAT107 - JPA oversikt',hints:['find() = SELECT by PK','null hvis ikke funnet','Raskest for PK']},
{id:268,type:'flervalg',topic:'jpa',diff:'medium',q:'Hva er @GeneratedValue(strategy=GenerationType.IDENTITY)?',opts:['Tilfeldig ID','Database genererer PK automatisk (SERIAL i PostgreSQL)','UUID som PK','Kompositt PK'],ans:1,exp:'<b>Database genererer PK automatisk</b> — tilsvarer SERIAL i PostgreSQL. Auto-increment.',pen:'DAT107 - JPA oversikt',hints:['SERIAL = auto-increment','Database genererer','@Id + @GeneratedValue']},
{id:269,type:'kode',topic:'jpa',diff:'medium',q:'Hva er riktig annotasjon for mange-til-én?',code:'@Entity\npublic class Telefon {\n    @Id private int nummer;\n    \n    // Telefon tilhører én Person\n    ____\n    @JoinColumn(name = "eier_pnr")\n    private Person eier;\n}',opts:['@OneToMany','@ManyToOne','@ManyToMany','@OneToOne'],ans:1,exp:'<b>@ManyToOne</b> — mange Telefoner til én Person. FK er i Telefon-tabellen.',pen:'DAT107 - JPA oversikt',hints:['Mange Telefoner → én Person','FK i Telefon-tabellen','@ManyToOne']},
{id:270,type:'kode',topic:'jpa',diff:'medium',q:'Hva er riktig annotasjon for én-til-mange?',code:'@Entity\npublic class Person {\n    @Id private String personnr;\n    \n    // Person har mange Telefoner\n    ____(mappedBy = "eier")\n    private List<Telefon> telefoner;\n}',opts:['@ManyToOne','@OneToMany','@ManyToMany','@OneToOne'],ans:1,exp:'<b>@OneToMany</b> — én Person, mange Telefoner. mappedBy peker på FK-feltnavnet i Telefon.',pen:'DAT107 - JPA oversikt',hints:['Én Person → mange Telefoner','mappedBy = FK-feltnavnet','@OneToMany']},
{id:271,type:'flervalg',topic:'jpa',diff:'medium',q:'Hva er FetchType.EAGER?',opts:['Last data ved behov (lazy)','Last relaterte data umiddelbart','Last aldri','Standard for @OneToMany'],ans:1,exp:'<b>Last relaterte data umiddelbart</b> med parent. FetchType.LAZY = last ved første bruk. EAGER er default for @ManyToOne.',pen:'DAT107 - JPA oversikt',hints:['EAGER = nå, straks','LAZY = ved bruk','Default: ManyToOne=EAGER, OneToMany=LAZY']},
{id:272,type:'kode',topic:'jpa',diff:'medium',q:'Hva er JPQL?',code:'String q = "SELECT p FROM Person p WHERE p.bosted.postnr = :postnr";\nTypedQuery<Person> query = em.createQuery(q, Person.class);\nquery.setParameter("postnr", postnr);',opts:['SQL mot tabellnavn','Java Persistence Query Language — bruker klasse/feltnavn','XML-spørring','MongoDB-spørring'],ans:1,exp:'<b>JPQL</b> = Java Persistence Query Language. Bruker klassenavn og feltnavn, ikke tabell/kolonnenavn. p.bosted.postnr navigerer via objektrelasjon.',pen:'DAT107 - JPA oversikt',hints:['JPQL: klasse/feltnavn','Ikke tabell/kolonnenavn','Navigerer objekter']},
{id:273,type:'flervalg',topic:'jpa',diff:'medium',q:'Hva er en detached entity?',opts:['Slettet objekt','Objekt utenfor EntityManager-kontekst (etter em.close())','Ny, ikke-lagret objekt','Oppdatert objekt'],ans:1,exp:'<b>Utenfor persistence context</b> — etter em.close() eller tx-avslutning. Endringer synces ikke til DB. Bruk em.merge() for å re-attache.',pen:'DAT107 - JPA oversikt',hints:['Etter em.close()', 'Endringer synces ikke','em.merge() re-attacher']},
{id:274,type:'kode',topic:'jpa',diff:'medium',q:'Eksamen Mai 2023: Hva trenger Spilleliste for å hente låter automatisk?',code:'@Entity\npublic class Spilleliste {\n    @Id @GeneratedValue\n    private int id;\n    \n    @ManyToMany(____)\n    @JoinTable(...)\n    private List<Laat> laater;\n}',opts:['fetch = FetchType.LAZY','fetch = FetchType.EAGER','cascade = CascadeType.ALL','mappedBy = "laater"'],ans:1,exp:'<b>FetchType.EAGER</b> — uten EAGER lastes låtene LAZY (ved første tilgang). For å unngå LazyInitializationException etter em.close(), bruk EAGER.',pen:'DAT107 Eksamen Mai 2023',hints:['EAGER = hent straks','LAZY = ved første bruk','Unngå LazyInitializationException']},
{id:275,type:'kode',topic:'jpa',diff:'hard',q:'Eksamen Jan 2026: Fullfør leggTilTelefon():',code:'boolean leggTilTelefon(String personnr, int nummer) {\n    EntityManager em = emf.createEntityManager();\n    EntityTransaction tx = em.getTransaction();\n    Person person = em.find(Person.class, personnr);\n    if (person == null) return false;\n    // Sjekk at nummeret ikke allerede eksisterer\n    if (____ != null) return false;\n    tx.begin();\n    Telefon t = new Telefon(nummer, person);\n    em.persist(t);\n    tx.commit();\n    return true;\n}',opts:['em.find(String.class, nummer)','em.find(Telefon.class, nummer)','em.createQuery(nummer)','em.merge(nummer)'],ans:1,exp:'<b>em.find(Telefon.class, nummer)</b> — sjekker om nummeret allerede finnes. Returnerer null om ikke.',pen:'DAT107 Eksamen Januar 2026',hints:['Sjekk om nummer finnes','em.find(Klasse, PK)','Telefon.class, nummer']},
{id:276,type:'flervalg',topic:'jpa',diff:'medium',q:'Hva er "høna og egget"-problemet i JPA?',opts:['Circular imports','To tabeller med gjensidig FK — ingen kan opprettes først','Tomt datasett','Manglende @Entity'],ans:1,exp:'<b>Gjensidig FK</b> — Ansatt har FK til Avdeling, Avdeling har FK til Ansatt (sjef). Løsning: opprett uten FK, legg til med ALTER TABLE eller bruk em.flush().',pen:'DAT107 - JPA oversikt',hints:['A peker på B, B peker på A','Ingen kan opprettes alene','ALTER TABLE etterpå']},
{id:277,type:'flervalg',topic:'jpa',diff:'easy',q:'Tom konstruktør i entity-klasse?',opts:['Valgfri','KREVES av JPA','Bare for testing','Deprecated'],ans:1,exp:'<b>KREVES av JPA!</b> JPA bruker refleksjon for å instansiere objekter. Uten tom konstruktør: runtime-feil.',pen:'DAT107 - JPA oversikt',hints:['JPA bruker refleksjon','new Ansatt() via refleksjon','Mangler tom konstruktør = feil']},
{id:278,type:'kode',topic:'jpa',diff:'medium',q:'Hva er forskjellen på em.merge() og persist()?',opts:['Ingen','persist() = ny rad (INSERT). merge() = oppdater detached (UPDATE)','merge() = ny rad. persist() = UPDATE','merge() = sletting'],ans:1,exp:'<b>persist() = INSERT (ny).</b> merge() = håndterer detached objekt (syncer til DB, INSERT eller UPDATE).',pen:'DAT107 - JPA oversikt',hints:['persist = ny/INSERT','merge = detached objekt','merge: INSERT eller UPDATE']},

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function pct(c,t){return t===0?0:Math.round(c/t*100);}

let S={phase:'home',selTopics:[],selFag:null,count:10,examMode:false,wrongOnly:false,questions:[],idx:0,selected:null,answered:false,hints:0,results:[],streak:0,timeLeft:90,timedOut:false};
let stats=null,timer=null;

async function loadStats(){try{const r=await window.storage.get('datquiz_v4');stats=r?JSON.parse(r.value):es();}catch{stats=es();}render();}
async function saveStats(){try{await window.storage.set('datquiz_v4',JSON.stringify(stats));}catch{}}
function es(){return{sessions:[],totalQ:0,totalCorrect:0,bestStreak:0,topicStats:{},wrongIds:[]};}

function startQuiz(){
  clearInterval(timer);
  let pool=[...QB];
  if(S.selFag)pool=pool.filter(q=>TINFO[q.topic]&&TINFO[q.topic].fag===S.selFag);
  if(S.selTopics.length)pool=pool.filter(q=>S.selTopics.includes(q.topic));
  if(S.wrongOnly&&stats.wrongIds.length)pool=pool.filter(q=>stats.wrongIds.includes(q.id));
  if(!pool.length){alert('Ingen spørsmål!');return;}
  S.questions=shuffle(pool).slice(0,Math.min(S.count,pool.length));
  S.idx=0;S.selected=null;S.answered=false;S.hints=0;S.results=[];S.streak=0;S.timedOut=false;
  if(S.examMode){S.timeLeft=90;startTimer();}
  S.phase='quiz';render();
}
function startTimer(){
  clearInterval(timer);
  timer=setInterval(()=>{
    S.timeLeft--;
    const el=document.getElementById('tm');
    if(el){el.textContent=S.timeLeft+'s';el.className='timer'+(S.timeLeft<=15?' urgent':'');}
    if(S.timeLeft<=0){clearInterval(timer);S.timedOut=true;handleAns(-1);}
  },1000);
}
function handleAns(i){
  if(S.answered)return;
  clearInterval(timer);S.selected=i;S.answered=true;
  const q=S.questions[S.idx];const ok=i===q.ans;
  S.results.push({id:q.id,correct:ok,topic:q.topic,q:q.q});
  if(ok)S.streak++;else S.streak=0;
  if(S.examMode)setTimeout(nextQ,400);else render();
}
function nextQ(){
  clearInterval(timer);
  if(S.idx+1>=S.questions.length)finishSession();
  else{S.idx++;S.selected=null;S.answered=false;S.hints=0;S.timedOut=false;if(S.examMode){S.timeLeft=90;startTimer();}render();}
}
function finishSession(){
  clearInterval(timer);
  const res=S.results;const correct=res.filter(r=>r.correct).length;const total=res.length;
  stats.totalQ+=total;stats.totalCorrect+=correct;stats.bestStreak=Math.max(stats.bestStreak,S.streak);
  stats.sessions=[{date:new Date().toLocaleDateString('nb-NO',{day:'2-digit',month:'2-digit'}),score:correct,total,mode:S.examMode?'E':'N'},...(stats.sessions||[])].slice(0,25);
  if(!stats.topicStats)stats.topicStats={};
  for(const r of res){if(!stats.topicStats[r.topic])stats.topicStats[r.topic]={correct:0,total:0};stats.topicStats[r.topic].total++;if(r.correct)stats.topicStats[r.topic].correct++;}
  const cw=new Set(stats.wrongIds||[]);
  for(const r of res){if(!r.correct)cw.add(r.id);else cw.delete(r.id);}
  stats.wrongIds=[...cw];saveStats();S.phase='results';render();
}

function render(){
  const root=document.getElementById('root');if(!root||!stats)return;
  if(S.phase==='home')root.innerHTML=renderHome();
  else if(S.phase==='quiz')root.innerHTML=renderQuiz();
  else if(S.phase==='results')root.innerHTML=renderResults();
  else if(S.phase==='stats')root.innerHTML=renderStats();
  attachEvents();
}

function renderHome(){
  const wc=(stats.wrongIds||[]).length,tot=stats.totalQ;
  const topicCounts={};QB.forEach(q=>topicCounts[q.topic]=(topicCounts[q.topic]||0)+1);
  const fagTopics=(fag)=>Object.entries(TINFO).filter(([,v])=>v.fag===fag||!fag);
  const dat102Count=QB.filter(q=>TINFO[q.topic]?.fag==='dat102').length;
  const dat107Count=QB.filter(q=>TINFO[q.topic]?.fag==='dat107').length;
  const filteredTopics=S.selFag?Object.entries(TINFO).filter(([,v])=>v.fag===S.selFag):Object.entries(TINFO);
  return`<div class="app">
  <div class="top-row"><div class="logo">DAT<span>Quiz</span></div><button class="btn-g" data-a="go-stats">Statistikk →</button></div>
  ${tot>0?`<div class="stat-grid"><div class="stat-card"><div class="stnum">${pct(stats.totalCorrect,tot)}%</div><div class="stlbl">snitt</div></div><div class="stat-card"><div class="stnum">${tot}</div><div class="stlbl">spørsmål</div></div><div class="stat-card"><div class="stnum">${stats.bestStreak}</div><div class="stlbl">streak</div></div><div class="stat-card"><div class="stnum" style="color:${wc>0?'#f09595':'#5dcaa5'}">${wc}</div><div class="stlbl">feilbunke</div></div></div>`:''}
  <div class="card">
    <div class="sect-label">Fag</div>
    <div class="fag-row">
      <button class="fag-btn${!S.selFag?' active':''}" data-fag="">Alle (${QB.length})</button>
      <button class="fag-btn${S.selFag==='dat102'?' active':''}" data-fag="dat102">DAT102 (${dat102Count})</button>
      <button class="fag-btn${S.selFag==='dat107'?' active':''}" data-fag="dat107">DAT107 (${dat107Count})</button>
    </div>
  </div>
  <div class="card"><div class="sect-label">Temaer (tomt = alle valgte fag)</div><div class="topic-grid">${filteredTopics.map(([id,info])=>{const sel=S.selTopics.includes(id);return`<button class="topic-chip${sel?' sel':''}" data-topic="${id}"><div style="font-size:13px;font-weight:500;color:${sel?'#a89ef5':'#ccc'}">${info.label}</div><div style="font-size:11px;color:${sel?'#7f77dd':'#555'};margin-top:2px">${topicCounts[id]||0} spørsmål</div></button>`;}).join('')}</div></div>
  <div class="card"><div class="sect-label">Antall spørsmål</div><div class="pill-row">${[5,10,15,20].map(n=>`<button class="pill${S.count===n?' sel':''}" data-count="${n}">${n}</button>`).join('')}</div></div>
  <div class="card"><div class="sect-label">Modus</div><div class="mode-row"><button class="mode-btn${!S.examMode?' active':''}" data-mode="normal">Normal</button><button class="mode-btn${S.examMode?' active':''}" data-mode="eksamen">Eksamen (tidspress)</button></div>${S.examMode?`<div style="font-size:12px;color:#444;margin-top:8px">90 sek/spørsmål — ingen hint — tilbakemelding til slutt</div>`:''}</div>
  ${wc>0?`<div class="card"><div style="display:flex;align-items:center;justify-content:space-between"><div><div style="font-size:14px;font-weight:500">Feilbunke</div><div style="font-size:12px;color:#555;margin-top:2px">${wc} spørsmål du har svart feil</div></div><button class="pill${S.wrongOnly?' sel':''}" data-a="toggle-wrong">${S.wrongOnly?'Valgt ✓':'Velg'}</button></div></div>`:''}
  <div style="display:flex;justify-content:flex-end;margin-top:.75rem"><button class="btn-p" data-a="start">Start quiz</button></div>
  ${stats.sessions&&stats.sessions.length?`<div class="card" style="margin-top:10px"><div class="sect-label">Siste sesjoner</div>${stats.sessions.slice(0,5).map(ss=>`<div class="sess-row"><span style="color:#555">${ss.date}${ss.mode==='E'?' [eks]':''}</span><span style="font-weight:500;color:${pct(ss.score,ss.total)>=70?'#5dcaa5':'#aaa'}">${ss.score}/${ss.total} — ${pct(ss.score,ss.total)}%</span></div>`).join('')}</div>`:''}
</div>`;
}

function renderQuiz(){
  const q=S.questions[S.idx];const prog=Math.round(S.idx/S.questions.length*100);const ti=TINFO[q.topic]||{label:q.topic,color:'#888'};const tc=TCOLOR[q.type]||'#888';
  let banner='';
  if(S.answered&&!S.examMode){
    if(S.timedOut)banner=`<div class="res-time">Tid ute! Riktig: ${L[q.ans]}) ${q.opts[q.ans]}</div>`;
    else if(S.selected===q.ans)banner=`<div class="res-ok">Riktig!${S.streak>1?` <span class="streak-pill">${S.streak} på rad</span>`:''}</div>`;
    else banner=`<div class="res-fail">Feil. Riktig: ${L[q.ans]}) ${q.opts[q.ans]}</div>`;
  }
  const optsHTML=q.opts.map((opt,i)=>{let cls='opt';if(S.answered){if(i===q.ans)cls+=' correct';else if(i===S.selected&&i!==q.ans)cls+=' wrong';}return`<button class="${cls}"${S.answered?' disabled':''} data-ans="${i}"><span class="opt-l">${L[i]}</span><span>${opt}</span></button>`;}).join('');
  let hintHTML='';
  if(!S.examMode&&!S.answered&&q.hints&&q.hints.length){
    const sh=S.hints,mx=q.hints.length;
    hintHTML=`<div class="hint-sec"><div class="hint-ctrl"><button class="btn-g" data-a="hint"${sh>=mx?' disabled':''} style="font-size:12px;padding:4px 8px">${sh===0?'Hint':'Neste hint'} (${sh}/${mx})</button><div class="hdots">${q.hints.map((_,i)=>`<div class="hdot${i<sh?' used':''}"></div>`).join('')}</div></div>${sh>0?`<div class="hint-box">${q.hints.slice(0,sh).map((h,i)=>`<div style="margin-bottom:${i<sh-1?'6px':'0'}"><b>Hint ${i+1}:</b> ${h}</div>`).join('')}</div>`:''}</div>`;
  }
  let expHTML='';
  if(S.answered&&!S.examMode)expHTML=`<div class="exp-box">${q.exp}<div class="pen-ref">Pensum: ${q.pen}</div></div>`;
  return`<div class="app">
  <div class="top-row"><button class="btn-g" data-a="go-home" style="font-size:12px">← Hjem</button>${S.examMode?`<span class="timer" id="tm">${S.timeLeft}s</span>`:`<span style="font-size:13px;color:#555">${S.idx+1} / ${S.questions.length}</span>`}</div>
  <div class="prog-track"><div class="prog-fill" style="width:${prog}%"></div></div>
  <div class="card">
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <span class="badge" style="background:${tc}22;color:${tc}">${TLABEL[q.type]||q.type}</span>
      <span class="badge" style="background:${ti.color}22;color:${ti.color}">${ti.label}</span>
      <span class="badge" style="background:#1a1a24;color:#555">${q.diff}</span>
    </div>
    <div class="q-text">${q.q}</div>
    ${q.code?`<div class="code-block">${q.code}</div>`:''}
    ${banner}<div class="opts">${optsHTML}</div>
    ${hintHTML}${expHTML}
    ${S.answered?`<div style="display:flex;justify-content:flex-end;margin-top:1rem"><button class="btn-p" data-a="next">${S.idx+1<S.questions.length?'Neste →':'Resultater →'}</button></div>`:''}
  </div>
</div>`;
}

function renderResults(){
  const res=S.results;const c=res.filter(r=>r.correct).length;const t=res.length;const p=pct(c,t);
  const col=p>=80?'#1d9e75':p>=60?'#ba7517':'#e24b4a';
  const byTopic={};res.forEach(r=>{if(!byTopic[r.topic])byTopic[r.topic]={ok:0,tot:0};byTopic[r.topic].tot++;if(r.correct)byTopic[r.topic].ok++;});
  return`<div class="app">
  <div class="top-row"><div class="logo">DAT<span>Quiz</span></div><button class="btn-g" data-a="go-home">Hjem</button></div>
  <div class="card" style="text-align:center;padding:2rem 1.25rem">
    <div class="score-circ" style="border-color:${col}"><div class="snum" style="color:${col}">${p}%</div><div class="ssub">${c}/${t}</div></div>
    <div style="font-size:15px;color:#aaa">${p>=80?'Utmerket!':p>=60?'Bra jobba!':'Øv mer!'}</div>
    ${S.streak>1?`<div style="margin-top:8px"><span class="streak-pill">Streak: ${S.streak} på rad</span></div>`:''}
  </div>
  <div class="stat-grid">
    <div class="stat-card"><div class="stnum" style="color:#5dcaa5">${c}</div><div class="stlbl">riktige</div></div>
    <div class="stat-card"><div class="stnum" style="color:#f09595">${t-c}</div><div class="stlbl">feil</div></div>
    <div class="stat-card"><div class="stnum">${stats.bestStreak}</div><div class="stlbl">beste streak</div></div>
    <div class="stat-card"><div class="stnum">${pct(stats.totalCorrect,stats.totalQ)}%</div><div class="stlbl">snitt totalt</div></div>
  </div>
  ${Object.keys(byTopic).length>1?`<div class="card"><div class="sect-label">Denne runden</div>${Object.entries(byTopic).map(([id,v])=>{const ti=TINFO[id]||{label:id,color:'#888'};const p2=pct(v.ok,v.tot);return`<div class="tstat-row"><span style="min-width:110px;font-size:13px;color:#ccc">${ti.label}</span><div class="bar-bg"><div class="bar-fill" style="width:${p2}%;background:${ti.color}"></div></div><span style="font-size:12px;color:#666;min-width:44px;text-align:right">${p2}% (${v.tot})</span></div>`;}).join('')}</div>`:''}
  <div class="card"><div class="sect-label">Gjennomgang</div>${res.map(r=>{const q=QB.find(x=>x.id===r.id);return`<div class="rev-item"><div style="display:flex;gap:8px;align-items:flex-start"><span class="${r.correct?'b-ok':'b-fail'}">${r.correct?'Riktig':'Feil'}</span><span style="color:#aaa;line-height:1.4">${r.q}</span></div>${!r.correct&&q?`<div style="font-size:12px;color:#5dcaa5;margin-top:4px">Riktig: ${L[q.ans]}) ${q.opts[q.ans]}</div>`:''}</div>`;}).join('')}</div>
  <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:.75rem;flex-wrap:wrap">
    <button class="btn-s" data-a="go-stats">Statistikk</button>
    <button class="btn-s" data-a="retry">Prøv igjen</button>
    <button class="btn-p" data-a="go-home">Ny runde</button>
  </div>
</div>`;
}

  const ts=stats.topicStats||{};const kode=QB.filter(q=>q.type!=='flervalg').length;
  const dat102=QB.filter(q=>TINFO[q.topic]?.fag==='dat102').length;
  const dat107=QB.filter(q=>TINFO[q.topic]?.fag==='dat107').length;
  return`<div class="app">
  <div class="top-row"><div class="logo">DAT<span>Quiz</span></div><button class="btn-g" data-a="go-home">Hjem</button></div>

  <div class="stat-grid"><div class="stat-card"><div class="stnum">${stats.totalQ}</div><div class="stlbl">besvart</div></div><div class="stat-card"><div class="stnum">${pct(stats.totalCorrect,stats.totalQ)}%</div><div class="stlbl">snitt</div></div><div class="stat-card"><div class="stnum">${stats.bestStreak}</div><div class="stlbl">beste streak</div></div><div class="stat-card"><div class="stnum">${(stats.sessions||[]).length}</div><div class="stlbl">sesjoner</div></div></div>
  <div class="card"><div class="sect-label">Per tema</div>${Object.entries(TINFO).map(([id,info])=>{const t=ts[id];const label=`${info.label} <span style="font-size:10px;color:#3a3a4a">[${info.fag.toUpperCase()}]</span>`;if(!t||t.total===0)return`<div class="tstat-row"><span style="min-width:130px;font-size:12px;color:#333">${info.label}</span><div class="bar-bg"></div><span style="font-size:12px;color:#333;min-width:44px;text-align:right">—</span></div>`;const p2=pct(t.correct,t.total);return`<div class="tstat-row"><span style="min-width:130px;font-size:12px;color:#ccc">${info.label}</span><div class="bar-bg"><div class="bar-fill" style="width:${p2}%;background:${info.color}"></div></div><span style="font-size:12px;color:#888;min-width:44px;text-align:right">${p2}% (${t.total})</span></div>`;}).join('')}</div>
  ${stats.sessions&&stats.sessions.length?`<div class="card"><div class="sect-label">Historikk</div>${stats.sessions.slice(0,15).map(ss=>`<div class="sess-row"><span style="color:#555">${ss.date}${ss.mode==='E'?' [eks]':''}</span><span style="color:${pct(ss.score,ss.total)>=70?'#5dcaa5':'#888'};font-weight:500">${ss.score}/${ss.total} — ${pct(ss.score,ss.total)}%</span></div>`).join('')}</div>`:''}
  <div style="margin-top:.75rem;text-align:right"><button class="btn-s" data-a="reset" style="color:#f09595;border-color:#3a1515">Nullstill statistikk</button></div>
</div>`;
}

function attachEvents(){
  document.querySelectorAll('[data-topic]').forEach(b=>b.addEventListener('click',()=>{const t=b.dataset.topic;const i=S.selTopics.indexOf(t);if(i>=0)S.selTopics.splice(i,1);else S.selTopics.push(t);render();}));
  document.querySelectorAll('[data-count]').forEach(b=>b.addEventListener('click',()=>{S.count=+b.dataset.count;render();}));
  document.querySelectorAll('[data-mode]').forEach(b=>b.addEventListener('click',()=>{S.examMode=b.dataset.mode==='eksamen';render();}));
  document.querySelectorAll('[data-fag]').forEach(b=>b.addEventListener('click',()=>{S.selFag=b.dataset.fag||null;S.selTopics=[];render();}));
  document.querySelectorAll('[data-ans]').forEach(b=>b.addEventListener('click',()=>handleAns(+b.dataset.ans)));
  document.querySelectorAll('[data-a]').forEach(b=>b.addEventListener('click',()=>{
    const a=b.dataset.a;
    if(a==='start')startQuiz();
    else if(a==='next')nextQ();
    else if(a==='hint'){if(S.hints<(S.questions[S.idx]?.hints||[]).length)S.hints++;render();}
    else if(a==='go-home'){clearInterval(timer);S.phase='home';render();}
    else if(a==='go-stats'){clearInterval(timer);S.phase='stats';render();}
    else if(a==='retry'){S.phase='home';startQuiz();}
    else if(a==='toggle-wrong'){S.wrongOnly=!S.wrongOnly;render();}
    else if(a==='reset'){if(confirm('Nullstille all statistikk?')){stats=es();saveStats();render();}}
  }));
}
loadStats();
</script>

</html>
